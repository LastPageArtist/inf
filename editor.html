<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Canvas Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root {
  --bg:        #f0ece3;
  --surface:   #e7e2d8;
  --panel-bg:  #ece8df;
  --border:    rgba(44,40,32,0.14);
  --border-s:  rgba(44,40,32,0.26);
  --text:      #2c2820;
  --text-dim:  #8a8278;
  --blue:      #3b82f6;
  --red:       #b83a3a;
  --serif:     'Libre Baskerville', serif;
  --mono:      'DM Mono', monospace;
  --panel-w:   256px;
  --bar-h:     48px;
  --r:         5px;
}
[data-theme="dark"] {
  --bg:        #1c1b18;
  --surface:   #27261f;
  --panel-bg:  #222118;
  --border:    rgba(224,219,208,0.14);
  --border-s:  rgba(224,219,208,0.26);
  --text:      #e0dbd0;
  --text-dim:  #7a7870;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--serif);transition:background .3s; }

/* ── Toolbar ── */
#toolbar {
  position:fixed;top:0;left:0;right:0;height:var(--bar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:2px;padding:0 10px;z-index:200;
  overflow-x:auto; transition:background .3s,border-color .3s;
}
#toolbar::-webkit-scrollbar{display:none;}
.tb-sep{flex-shrink:0;width:1px;height:20px;background:var(--border);margin:0 4px;}
.tb-btn {
  flex-shrink:0;height:30px;padding:0 10px;
  border:1px solid transparent;border-radius:var(--r);
  background:transparent;cursor:pointer;
  font-family:var(--serif);font-size:12px;letter-spacing:.05em;color:var(--text);
  display:flex;align-items:center;gap:5px;
  transition:background .1s,border-color .1s,color .3s;white-space:nowrap;
}
.tb-btn:hover  {background:rgba(0,0,0,.06);border-color:var(--border);}
.tb-btn.active {background:var(--text);color:var(--bg);border-color:var(--text);}
.tb-btn svg{width:14px;height:14px;flex-shrink:0;}
#toolbar-title{font-family:'Libre Baskerville',serif;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--text);margin-right:auto;transition:color .3s;}

/* ── Canvas ── */
#canvas-wrap {
  position:fixed;top:var(--bar-h);left:0;right:var(--panel-w);bottom:0;
  overflow:hidden;cursor:default;background:var(--bg);user-select:none;transition:background .3s;
}
#canvas-wrap.mode-pan{cursor:grab;}
#canvas-wrap.mode-pan.panning{cursor:grabbing;}
#grid-bg{position:absolute;inset:0;pointer-events:none;}
#world  {position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}

/* ── Object wrappers ── */
.obj-wrap{position:absolute;cursor:move;}
.obj-wrap.selected>.sel-ring{display:block;}
.sel-ring{display:none;position:absolute;inset:-3px;border:1.5px solid var(--blue);border-radius:2px;pointer-events:none;}
.rh{display:none;position:absolute;width:8px;height:8px;background:var(--surface);border:1.5px solid var(--blue);border-radius:2px;z-index:10;}
.obj-wrap.selected .rh{display:block;}
.rh-se{bottom:-5px;right:-5px;cursor:se-resize} .rh-sw{bottom:-5px;left:-5px;cursor:sw-resize}
.rh-ne{top:-5px;right:-5px;cursor:ne-resize}    .rh-nw{top:-5px;left:-5px;cursor:nw-resize}
.rh-n{top:-5px;left:50%;transform:translateX(-50%);cursor:n-resize}
.rh-s{bottom:-5px;left:50%;transform:translateX(-50%);cursor:s-resize}
.rh-e{right:-5px;top:50%;transform:translateY(-50%);cursor:e-resize}
.rh-w{left:-5px;top:50%;transform:translateY(-50%);cursor:w-resize}

/* ── Text box ── */
.c-text {
  width:100%;height:100%;
  /* Outline is set directly per-element in JS each frame — see applyTransform().
     This is the only reliable way to get a physically-constant 1px border at all zoom levels. */
  outline: 1px solid rgba(44,40,32,0.32);
  border:none;padding:10px 12px;
  font-family:var(--serif);color:var(--text);font-size:16px;
  font-weight:400;letter-spacing:0.06em;
  line-height:1.5;word-break:break-word;
  background:transparent;overflow:hidden;pointer-events:none;
  transition:color .3s;
}
[data-theme="dark"] .c-text { outline-color: rgba(224,219,208,0.42); }
.c-text b,.c-text strong{font-weight:600;}
.c-text i,.c-text em    {font-style:italic;}
.c-text u               {text-decoration:underline;}
.c-text.editing{pointer-events:all;cursor:text;overflow:auto;}

/* ── Image / placeholder ── */
.c-image{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;}
.img-ph{
  width:100%;height:100%;border:1px dashed var(--border-s);background:rgba(0,0,0,.02);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:13px;pointer-events:none;font-family:var(--mono);
}

/* ── Panel ── */
#panel{
  position:fixed;top:var(--bar-h);right:0;bottom:0;width:var(--panel-w);
  background:var(--panel-bg);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;transition:background .3s,border-color .3s;
}
#panel-inner{padding:14px;flex:1;}
.panel-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.panel-empty{color:var(--text-dim);font-size:12px;font-family:var(--serif);letter-spacing:.04em;line-height:1.7;margin-top:6px;}
.panel-hint {font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:10px;line-height:1.6;}
.field-row{display:flex;flex-direction:column;gap:3px;margin-bottom:9px;}
.field-row label{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.field-row input[type=text],
.field-row input[type=number]{
  width:100%;padding:5px 7px;
  border:1px solid var(--border);border-radius:3px;
  font-family:var(--mono);font-size:12px;color:var(--text);
  background:var(--bg);outline:none;transition:border-color .12s,background .3s,color .3s;
}
.field-row input:focus{border-color:var(--blue);}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.field-grid .field-row{margin-bottom:0;}
.fmt-row{display:flex;gap:5px;margin-bottom:10px;}
.fmt-btn{
  flex:1;height:28px;border:1px solid var(--border);border-radius:3px;
  background:var(--bg);cursor:pointer;color:var(--text);
  font-family:var(--serif);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,border-color .1s,color .3s;user-select:none;
}
.fmt-btn:hover{background:var(--surface);border-color:var(--border-s);}
.fmt-btn.on   {background:var(--text);color:var(--bg);border-color:var(--text);}
.del-btn{
  width:100%;padding:7px;margin-top:4px;
  border:1px solid rgba(184,58,58,.3);border-radius:var(--r);
  background:rgba(184,58,58,.04);color:var(--red);
  font-family:var(--mono);font-size:11px;cursor:pointer;transition:background .1s;
}
.del-btn:hover{background:rgba(184,58,58,.1);}

/* ── Zoom HUD ── */
#zoom-hud{
  position:fixed;bottom:16px;
  left:calc(50% - var(--panel-w)/2);transform:translateX(-50%);
  z-index:150;display:flex;align-items:center;gap:6px;
}
.z-btn{
  width:28px;height:28px;border:1px solid var(--border-s);
  background:var(--surface);backdrop-filter:blur(6px);
  border-radius:var(--r);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:background .1s,color .3s,border-color .3s;
  font-family:var(--serif);
}
.z-btn svg{width:13px;height:13px;}
.z-btn:hover{background:var(--bg);}
#zoom-label{min-width:44px;text-align:center;font-family:var(--serif);letter-spacing:.06em;color:var(--text-dim);font-size:11px;}

/* Theme btn — top right of toolbar area */
#theme-btn-wrap{
  position:fixed;bottom:56px;
  left:calc(50% - var(--panel-w)/2);transform:translateX(-50%);z-index:150;
}
#theme-btn{
  width:28px;height:28px;border:1px solid var(--border-s);
  background:var(--surface);backdrop-filter:blur(6px);
  border-radius:var(--r);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:background .1s,color .3s,border-color .3s;
}
#theme-btn:hover{background:var(--bg);}
#theme-btn svg{width:15px;height:15px;}

/* ── Toast ── */
#toast{
  position:fixed;bottom:56px;
  left:calc(50% - var(--panel-w)/2);transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  font-family:var(--mono);font-size:11px;padding:5px 14px;
  border-radius:var(--r);opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:160;white-space:nowrap;
}
#toast.show{opacity:1;}

/* ── Drop overlay ── */
#drop-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(59,130,246,.07);border:3px dashed var(--blue);
  display:none;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:22px;color:var(--blue);pointer-events:none;
}
#drop-overlay.show{display:flex;}

/* ── Modal ── */
#modal-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.4);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex;}
#modal{
  background:var(--panel-bg);border-radius:8px;
  width:500px;max-width:93vw;
  box-shadow:0 10px 48px rgba(0,0,0,.24);
  display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--border);
}
#modal-tabs{display:flex;border-bottom:1px solid var(--border);}
.m-tab{
  flex:1;padding:12px;border:none;background:transparent;
  font-family:var(--serif);font-size:12px;letter-spacing:.05em;cursor:pointer;
  color:var(--text-dim);border-bottom:2px solid transparent;transition:color .1s,border-color .1s;
}
.m-tab.active{color:var(--text);border-bottom-color:var(--text);}
#modal-body{padding:18px;}
#modal-body textarea{
  width:100%;height:200px;resize:vertical;
  font-family:var(--mono);font-size:11px;padding:8px;
  border:1px solid var(--border);border-radius:4px;
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color .12s;line-height:1.5;
}
#modal-body textarea:focus{border-color:var(--blue);}
.modal-hint{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:8px;line-height:1.5;}
.modal-file-area{
  border:2px dashed var(--border);border-radius:6px;
  padding:36px;text-align:center;cursor:pointer;
  font-family:var(--serif);color:var(--text-dim);font-size:13px;letter-spacing:.05em;
  transition:border-color .15s,background .15s;
}
.modal-file-area:hover{border-color:var(--blue);background:rgba(59,130,246,.03);color:var(--text);}
#modal-footer{display:flex;gap:8px;padding:0 18px 18px;}
.modal-btn{
  flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg);cursor:pointer;
  font-family:var(--serif);font-size:12px;letter-spacing:.05em;color:var(--text);transition:background .1s;
}
.modal-btn:hover{background:var(--surface);}
.modal-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.modal-btn.primary:hover{opacity:.85;}
.modal-error{color:var(--red);font-family:var(--mono);font-size:11px;margin-top:8px;min-height:16px;}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span id="toolbar-title">canvas editor</span>

  <button class="tb-btn active" id="tool-select" title="Select (V)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>
    Select
  </button>
  <button class="tb-btn" id="tool-pan" title="Pan (H)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v2M8 12v2M2 8h2M12 8h2M4.9 4.9l1.4 1.4M9.7 9.7l1.4 1.4M4.9 11.1l1.4-1.4M9.7 6.3l1.4-1.4"/></svg>
    Pan
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-add-text">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M8 4v8M5 12h6"/></svg>
    Text
  </button>
  <button class="tb-btn" id="btn-add-image">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="6" cy="7" r="1.2"/><path d="M2 11l3.5-3.5 2.5 2.5 2-2 4 4"/></svg>
    Image
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-import">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3M3 11v2h10v-2"/></svg>
    Import JSON
  </button>
  <button class="tb-btn" id="btn-export">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M3 11v2h10v-2"/></svg>
    Export
  </button>
  <button class="tb-btn" id="btn-copy-json">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 11V3h8"/></svg>
    Copy JSON
  </button>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <div id="grid-bg"></div>
  <div id="world"></div>
</div>

<!-- Panel -->
<div id="panel">
  <div id="panel-inner">
    <div class="panel-label">Properties</div>
    <div id="prop-area">
      <p class="panel-empty">Select an object<br>to edit properties.</p>
    </div>
  </div>
</div>

<!-- Zoom HUD -->
<div id="zoom-hud">
  <button class="z-btn" id="btn-out">&#x2212;</button>
  <span id="zoom-label">100%</span>
  <button class="z-btn" id="btn-in">+</button>
  <button class="z-btn" id="btn-fit" title="Fit all content">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/>
      <rect x="5" y="5" width="6" height="6" rx="0.5"/>
    </svg>
  </button>
</div>

<!-- Theme toggle -->
<div id="theme-btn-wrap">
  <button id="theme-btn" title="Toggle theme">
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>  <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</div>

<div id="toast"></div>
<div id="drop-overlay">Drop image here</div>

<!-- Import modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-tabs">
      <button class="m-tab active" data-tab="paste">Paste JSON</button>
      <button class="m-tab"        data-tab="file">Import File</button>
    </div>
    <div id="modal-body">
      <div id="tab-paste">
        <p class="modal-hint">Paste the full contents of objects.json. Replaces everything on the canvas.</p>
        <textarea id="paste-area" placeholder='{ "objects": [ ... ] }'></textarea>
        <div class="modal-error" id="paste-error"></div>
      </div>
      <div id="tab-file" style="display:none">
        <p class="modal-hint">Choose any .json file exported from this editor.</p>
        <div class="modal-file-area" id="modal-file-drop">
          Click to choose a file, or drag one here
          <input type="file" id="json-file-input" accept=".json,application/json" style="display:none">
        </div>
        <div class="modal-error" id="file-error"></div>
      </div>
    </div>
    <div id="modal-footer">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-confirm">Load</button>
    </div>
  </div>
</div>

<input type="file" id="img-file-input" accept="image/*" style="display:none">

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const MIN_S=0.04,MAX_S=8,ZOOM_STEP=0.15,GRID_BASE=28;
let tx=0,ty=0,scale=1,dark=false;
let objects=[],selectedId=null,nextId=1,activeTool='select',editingId=null;

const html       = document.documentElement;
const canvasWrap = document.getElementById('canvas-wrap');
const world      = document.getElementById('world');
const gridBg     = document.getElementById('grid-bg');
const zoomLabel  = document.getElementById('zoom-label');
const moonIco    = document.getElementById('icon-moon');
const sunIco     = document.getElementById('icon-sun');

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
function applyTheme() {
  html.setAttribute('data-theme', dark?'dark':'light');
  moonIco.style.display = dark?'none':'';
  sunIco.style.display  = dark?'':'none';
  applyTransform();
}
document.getElementById('theme-btn').addEventListener('click',()=>{
  dark=!dark; applyTheme();
  try{localStorage.setItem('cv-theme',dark?'dark':'light');}catch{}
});
try{dark=localStorage.getItem('cv-theme')==='dark';}catch{}

// ═══════════════════════════════════════════
//  TRANSFORM
// ═══════════════════════════════════════════
function applyTransform() {
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  zoomLabel.textContent=Math.round(scale*100)+'%';

  const sz=GRID_BASE*scale;
  const op=scale<0.1?0:Math.min(0.28,0.08+scale*0.15);
  const ox=((tx%sz)+sz)%sz, oy=((ty%sz)+sz)%sz;
  const dc=dark?`rgba(224,219,208,${op.toFixed(3)})`:`rgba(44,40,32,${op.toFixed(3)})`;
  gridBg.style.backgroundImage    =`radial-gradient(circle,${dc} 1.2px,transparent 1.2px)`;
  gridBg.style.backgroundSize     =`${sz}px ${sz}px`;
  gridBg.style.backgroundPosition =`${ox}px ${oy}px`;

  // ── Render-distance fix ────────────────────────────────
  // Set outline DIRECTLY on each .c-text element (not via CSS vars on #world).
  // CSS custom properties resolve in canvas-space, NOT screen-space, so the
  // var approach fails. Direct element assignment gives us true 1px screen-lines.
  const ow = (1/scale).toFixed(6)+'px';
  const oc = dark ? 'rgba(224,219,208,0.45)' : 'rgba(44,40,32,0.34)';
  document.querySelectorAll('#world .c-text').forEach(el => {
    if (el === (document.getElementById('wrap-'+editingId)?.querySelector('.c-text'))) {
      // editing element gets blue outline at same thickness
      el.style.outline = `${ow} solid var(--blue)`;
    } else {
      el.style.outline = `${ow} solid ${oc}`;
    }
  });
}

function zoomTo(ns,cx,cy){
  ns=Math.min(MAX_S,Math.max(MIN_S,ns));
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale);
  scale=ns; applyTransform();
}

// ═══════════════════════════════════════════
//  SMART FIT
// ═══════════════════════════════════════════
function fitAll() {
  if (!objects.length){tx=0;ty=0;scale=1;applyTransform();return;}
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  objects.forEach(o=>{
    x0=Math.min(x0,o.x); y0=Math.min(y0,o.y);
    x1=Math.max(x1,o.x+(o.width||200));
    y1=Math.max(y1,o.y+(o.height||100));
  });
  const cw=x1-x0, ch=y1-y0;
  // Padding grows proportionally with content spread
  const PAD=Math.max(56,Math.min(180,Math.max(cw,ch)*0.09));
  const vw=canvasWrap.offsetWidth-PAD*2;
  const vh=canvasWrap.offsetHeight-PAD*2;
  const ns=Math.min(MAX_S,Math.max(MIN_S,Math.min(vw/cw,vh/ch)));
  tx=PAD+(vw-cw*ns)/2-x0*ns;
  ty=PAD+(vh-ch*ns)/2-y0*ns;
  scale=ns; applyTransform();
}

// ═══════════════════════════════════════════
//  TOOLS & KEYBOARD
// ═══════════════════════════════════════════
function setTool(t){
  activeTool=t;
  document.getElementById('tool-select').classList.toggle('active',t==='select');
  document.getElementById('tool-pan').classList.toggle('active',t==='pan');
  canvasWrap.classList.toggle('mode-pan',t==='pan');
}
document.getElementById('tool-select').onclick=()=>setTool('select');
document.getElementById('tool-pan').onclick   =()=>setTool('pan');

document.addEventListener('keydown',e=>{
  const inInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable;
  if(!inInput){
    if(e.key==='v'||e.key==='V')setTool('select');
    if(e.key==='h'||e.key==='H')setTool('pan');
    if(e.key==='Escape'){stopEditing();selectObject(null);}
    if((e.key==='Delete'||e.key==='Backspace')&&selectedId)deleteSelected();
  }
  if(editingId&&(e.ctrlKey||e.metaKey)){
    if(e.key==='b'){e.preventDefault();execFmt('bold');}
    if(e.key==='i'){e.preventDefault();execFmt('italic');}
    if(e.key==='u'){e.preventDefault();execFmt('underline');}
  }
  if(e.key==='Escape'&&editingId)stopEditing();
});

// ═══════════════════════════════════════════
//  PAN
// ═══════════════════════════════════════════
let panState=null;
canvasWrap.addEventListener('mousedown',e=>{
  if(activeTool!=='pan')return;
  panState={sx:e.clientX,sy:e.clientY,stx:tx,sty:ty};
  canvasWrap.classList.add('panning');
});
window.addEventListener('mousemove',e=>{
  if(!panState)return;
  tx=panState.stx+e.clientX-panState.sx;
  ty=panState.sty+e.clientY-panState.sy;
  applyTransform();
});
window.addEventListener('mouseup',()=>{panState=null;canvasWrap.classList.remove('panning');});
canvasWrap.addEventListener('mousedown',e=>{
  if(activeTool==='pan')return;
  if(e.target===canvasWrap||e.target===world||e.target===gridBg){stopEditing();selectObject(null);}
});
canvasWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  let dy=e.deltaY;
  if(e.deltaMode===1)dy*=20; if(e.deltaMode===2)dy*=300;
  zoomTo(scale*Math.pow(1-ZOOM_STEP,dy/100),e.clientX,e.clientY);
},{passive:false});
document.getElementById('btn-in').onclick  =()=>zoomTo(scale*(1+ZOOM_STEP),canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
document.getElementById('btn-out').onclick =()=>zoomTo(scale*(1-ZOOM_STEP),canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
document.getElementById('btn-fit').onclick =fitAll;

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function screenToWorld(sx,sy){return{x:(sx-tx)/scale,y:(sy-ty)/scale};}
function createId(){return 'obj-'+(nextId++);}
function getObj(id){return objects.find(o=>o.id===id);}
function removeEl(id){const el=document.getElementById('wrap-'+id);if(el)el.remove();}

// ═══════════════════════════════════════════
//  SELECTION
// ═══════════════════════════════════════════
function selectObject(id){
  if(selectedId){const el=document.getElementById('wrap-'+selectedId);if(el)el.classList.remove('selected');}
  selectedId=id;
  if(id){const el=document.getElementById('wrap-'+id);if(el)el.classList.add('selected');}
  renderPanel();
}

// ═══════════════════════════════════════════
//  RICH TEXT
// ═══════════════════════════════════════════
function startEditing(id){
  if(editingId===id)return;
  stopEditing(); editingId=id;
  const wrap=document.getElementById('wrap-'+id);
  const inner=wrap&&wrap.querySelector('.c-text'); if(!inner)return;
  inner.classList.add('editing');
  inner.contentEditable='true';
  const ow=(1/scale).toFixed(6);
  inner.style.outline=`${ow}px solid var(--blue)`;
  inner.focus();
  const range=document.createRange();
  range.selectNodeContents(inner); range.collapse(false);
  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  renderPanel();
}

function stopEditing(){
  if(!editingId)return;
  const obj=getObj(editingId);
  const wrap=document.getElementById('wrap-'+editingId);
  if(wrap&&obj){
    const inner=wrap.querySelector('.c-text');
    if(inner){inner.contentEditable='false';inner.classList.remove('editing');obj.content=inner.innerHTML;}
  }
  editingId=null; applyTransform(); renderPanel();
}

function execFmt(cmd){
  if(!editingId){
    if(selectedId){
      const obj=getObj(selectedId);
      if(obj&&obj.type==='text'){
        startEditing(selectedId);
        const wrap=document.getElementById('wrap-'+selectedId);
        const inner=wrap&&wrap.querySelector('.c-text');
        if(inner){
          const r=document.createRange(); r.selectNodeContents(inner);
          const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
          document.execCommand(cmd,false,null);
          obj.content=inner.innerHTML; updateFmtButtons();
        }
      }
    }
    return;
  }
  document.execCommand(cmd,false,null);
  const obj=getObj(editingId);
  const wrap=document.getElementById('wrap-'+editingId);
  if(wrap&&obj){const inner=wrap.querySelector('.c-text');if(inner)obj.content=inner.innerHTML;}
  updateFmtButtons();
}

function queryFmt(cmd){try{return document.queryCommandState(cmd);}catch{return false;}}
function updateFmtButtons(){
  ['bold','italic','underline'].forEach(cmd=>{
    const btn=document.getElementById('fmt-'+cmd);
    if(btn)btn.classList.toggle('on',queryFmt(cmd));
  });
}
document.addEventListener('selectionchange',()=>{if(editingId)updateFmtButtons();});

// ═══════════════════════════════════════════
//  BUILD DOM
// ═══════════════════════════════════════════
function buildWrap(obj){
  const wrap=document.createElement('div');
  wrap.className='obj-wrap'; wrap.id='wrap-'+obj.id;
  wrap.style.cssText=`left:${obj.x}px;top:${obj.y}px;width:${obj.width}px;height:${obj.height?obj.height+'px':'auto'}`;
  const ring=document.createElement('div'); ring.className='sel-ring'; wrap.appendChild(ring);

  if(obj.type==='text'){
    const inner=document.createElement('div');
    inner.className='c-text';
    inner.style.fontSize=(obj.fontSize||16)+'px';
    inner.contentEditable='false';
    inner.innerHTML=obj.content||'';
    wrap.appendChild(inner);
    wrap.addEventListener('dblclick',e=>{if(activeTool==='pan')return;e.stopPropagation();selectObject(obj.id);startEditing(obj.id);});
    wrap.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rh'))return;
      e.stopPropagation(); if(activeTool==='pan')return;
      if(editingId&&editingId!==obj.id)stopEditing();
      if(editingId===obj.id)return;
      selectObject(obj.id); startDrag(e,obj.id);
    });
  } else {
    const img=document.createElement('img');
    img.className='c-image'; img.draggable=false; img.src=obj.dataUrl||'';
    img.onerror=()=>{img.remove();const ph=document.createElement('div');ph.className='img-ph';ph.textContent=obj.src||'image';wrap.appendChild(ph);};
    wrap.appendChild(img);
    wrap.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rh'))return;
      e.stopPropagation(); if(activeTool==='pan')return;
      stopEditing(); selectObject(obj.id); startDrag(e,obj.id);
    });
  }

  ['nw','n','ne','w','e','sw','s','se'].forEach(dir=>{
    const h=document.createElement('div'); h.className=`rh rh-${dir}`; wrap.appendChild(h);
    h.addEventListener('mousedown',e=>{e.stopPropagation();startResize(e,obj.id,dir);});
  });
  world.appendChild(wrap); return wrap;
}

function updateWrap(obj){
  const wrap=document.getElementById('wrap-'+obj.id);
  if(!wrap){buildWrap(obj);return;}
  wrap.style.left  =obj.x+'px'; wrap.style.top=obj.y+'px';
  wrap.style.width =obj.width+'px';
  wrap.style.height=obj.height?obj.height+'px':'auto';
  if(obj.type==='text'){
    const inner=wrap.querySelector('.c-text');
    if(inner){inner.style.fontSize=(obj.fontSize||16)+'px';if(editingId!==obj.id)inner.innerHTML=obj.content||'';}
  }
  applyTransform();
}

// ═══════════════════════════════════════════
//  DRAG & RESIZE
// ═══════════════════════════════════════════
function startDrag(e,id){
  const obj=getObj(id); if(!obj)return;
  const sx=e.clientX,sy=e.clientY,ox=obj.x,oy=obj.y;
  function onMove(e){obj.x=Math.round(ox+(e.clientX-sx)/scale);obj.y=Math.round(oy+(e.clientY-sy)/scale);updateWrap(obj);renderPanel();}
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
}
function startResize(e,id,dir){
  const obj=getObj(id); if(!obj)return;
  e.preventDefault(); stopEditing();
  const sx=e.clientX,sy=e.clientY,ox=obj.x,oy=obj.y,ow=obj.width;
  const oh=obj.height||document.getElementById('wrap-'+id).offsetHeight;
  function onMove(e){
    const dx=(e.clientX-sx)/scale,dy=(e.clientY-sy)/scale;
    let nx=ox,ny=oy,nw=ow,nh=oh;
    if(dir.includes('e'))nw=Math.max(60,ow+dx);
    if(dir.includes('s'))nh=Math.max(30,oh+dy);
    if(dir.includes('w')){nw=Math.max(60,ow-dx);nx=ox+(ow-nw);}
    if(dir.includes('n')){nh=Math.max(30,oh-dy);ny=oy+(oh-nh);}
    obj.x=Math.round(nx);obj.y=Math.round(ny);obj.width=Math.round(nw);obj.height=Math.round(nh);
    updateWrap(obj);renderPanel();
  }
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
}

// ═══════════════════════════════════════════
//  ADD OBJECTS
// ═══════════════════════════════════════════
function addText(){
  setTool('select');
  const c=screenToWorld(canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
  const obj={id:createId(),type:'text',x:Math.round(c.x-110),y:Math.round(c.y-40),width:220,height:80,fontSize:16,content:'New text'};
  objects.push(obj); buildWrap(obj); selectObject(obj.id); applyTransform();
}
function addImageFromDataUrl(dataUrl,filename){
  setTool('select');
  const img=new Image();
  img.onload=()=>{
    const maxW=400,maxH=400; let w=img.naturalWidth,h=img.naturalHeight;
    if(w>maxW){h=h*maxW/w;w=maxW;} if(h>maxH){w=w*maxH/h;h=maxH;}
    const c=screenToWorld(canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
    const obj={id:createId(),type:'image',x:Math.round(c.x-w/2),y:Math.round(c.y-h/2),width:Math.round(w),height:Math.round(h),src:filename,dataUrl};
    objects.push(obj); buildWrap(obj); selectObject(obj.id);
  };
  img.src=dataUrl;
}
document.getElementById('btn-add-text').onclick  =addText;
document.getElementById('btn-add-image').onclick =()=>document.getElementById('img-file-input').click();
document.getElementById('img-file-input').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=ev=>addImageFromDataUrl(ev.target.result,f.name);
  r.readAsDataURL(f); e.target.value='';
});

const dropOverlay=document.getElementById('drop-overlay');
let dragCtr=0;
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){e.preventDefault();dragCtr++;dropOverlay.classList.add('show');}});
document.addEventListener('dragleave',()=>{dragCtr--;if(dragCtr<=0){dragCtr=0;dropOverlay.classList.remove('show');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault(); dragCtr=0; dropOverlay.classList.remove('show');
  [...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach(f=>{
    const r=new FileReader(); r.onload=ev=>addImageFromDataUrl(ev.target.result,f.name); r.readAsDataURL(f);
  });
});

// ═══════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════
function deleteSelected(){
  stopEditing();
  objects=objects.filter(o=>o.id!==selectedId);
  removeEl(selectedId); selectedId=null; renderPanel();
}

// ═══════════════════════════════════════════
//  PANEL
// ═══════════════════════════════════════════
function renderPanel(){
  const area=document.getElementById('prop-area');
  if(!selectedId){area.innerHTML='<p class="panel-empty">Select an object<br>to edit properties.</p>';return;}
  const obj=getObj(selectedId); if(!obj){area.innerHTML='';return;}
  if(obj.type==='text'){
    area.innerHTML=`
      <p class="panel-hint">Double-click to edit inline.<br>Ctrl/⌘+B / I / U. Buttons apply to<br>selection, or all text if nothing selected.</p>
      <div class="panel-label">Formatting</div>
      <div class="fmt-row">
        <button class="fmt-btn" id="fmt-bold"      title="Bold (Ctrl+B)"><b>B</b></button>
        <button class="fmt-btn" id="fmt-italic"    title="Italic (Ctrl+I)"><em>I</em></button>
        <button class="fmt-btn" id="fmt-underline" title="Underline (Ctrl+U)"><u>U</u></button>
      </div>
      <div class="panel-label">Layout</div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x" value="${obj.x}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y" value="${obj.y}"></div>
        <div class="field-row"><label>Width</label><input type="number" id="f-w" value="${obj.width}"></div>
        <div class="field-row"><label>Height</label><input type="number" id="f-h" value="${obj.height||''}"></div>
        <div class="field-row"><label>Font size</label><input type="number" id="f-fs" value="${obj.fontSize||16}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    document.getElementById('fmt-bold').onclick      =()=>execFmt('bold');
    document.getElementById('fmt-italic').onclick    =()=>execFmt('italic');
    document.getElementById('fmt-underline').onclick =()=>execFmt('underline');
    updateFmtButtons();
    bind('f-x','number',v=>{obj.x=+v;updateWrap(obj);});
    bind('f-y','number',v=>{obj.y=+v;updateWrap(obj);});
    bind('f-w','number',v=>{obj.width=Math.max(20,+v);updateWrap(obj);});
    bind('f-h','number',v=>{obj.height=+v||undefined;updateWrap(obj);});
    bind('f-fs','number',v=>{obj.fontSize=Math.max(6,+v);updateWrap(obj);});
  } else {
    area.innerHTML=`
      <div class="panel-label">Image</div>
      <div class="field-row"><label>Filename (src)</label><input type="text" id="f-src" value="${escHtml(obj.src||'')}"></div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x" value="${obj.x}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y" value="${obj.y}"></div>
        <div class="field-row"><label>Width</label><input type="number" id="f-w" value="${obj.width}"></div>
        <div class="field-row"><label>Height</label><input type="number" id="f-h" value="${obj.height||''}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    bind('f-src','text',  v=>{obj.src=v;});
    bind('f-x',  'number',v=>{obj.x=+v;updateWrap(obj);});
    bind('f-y',  'number',v=>{obj.y=+v;updateWrap(obj);});
    bind('f-w',  'number',v=>{obj.width=Math.max(20,+v);updateWrap(obj);});
    bind('f-h',  'number',v=>{obj.height=+v||undefined;updateWrap(obj);});
  }
  document.getElementById('del-btn').onclick=deleteSelected;
}
function bind(id,type,cb){
  const el=document.getElementById(id); if(!el)return;
  el.addEventListener(type==='text'?'input':'change',()=>cb(el.value));
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════════
//  JSON
// ═══════════════════════════════════════════
function buildJson(){
  if(editingId){
    const obj=getObj(editingId);
    const wrap=document.getElementById('wrap-'+editingId);
    if(wrap&&obj){const inner=wrap.querySelector('.c-text');if(inner)obj.content=inner.innerHTML;}
  }
  const out=objects.map(o=>{
    const base={type:o.type,id:o.id,x:o.x,y:o.y,width:o.width};
    if(o.height)base.height=o.height;
    if(o.type==='text'){base.fontSize=o.fontSize||16;base.content=o.content||'';}
    else{base.src=o.src||'';}
    return base;
  });
  return JSON.stringify({objects:out},null,2);
}
document.getElementById('btn-export').onclick=()=>{
  const blob=new Blob([buildJson()],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='objects.json'; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('btn-copy-json').onclick=async()=>{
  const json=buildJson();
  try{await navigator.clipboard.writeText(json);}
  catch{const ta=document.createElement('textarea');ta.value=json;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast('Copied ✓');
};
function showToast(msg,dur=1800){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── Import
function loadJsonData(raw){
  try{
    const parsed=typeof raw==='string'?JSON.parse(raw):raw;
    if(!parsed.objects||!Array.isArray(parsed.objects))throw new Error('"objects" array missing');
    stopEditing(); selectObject(null);
    objects.forEach(o=>removeEl(o.id)); objects=[];
    parsed.objects.forEach(o=>{
      const obj={...o,id:o.id||createId()};
      const n=parseInt((obj.id||'').replace('obj-',''));
      if(!isNaN(n)&&n>=nextId)nextId=n+1;
      objects.push(obj); buildWrap(obj);
    });
    applyTransform(); fitAll(); return null;
  }catch(err){return err.message;}
}

const modalOverlay=document.getElementById('modal-overlay');
let activeTab='paste',pendingFileJson=null;
document.getElementById('btn-import').onclick=()=>{
  document.getElementById('paste-area').value='';
  document.getElementById('paste-error').textContent='';
  document.getElementById('file-error').textContent='';
  const drop=document.getElementById('modal-file-drop');
  drop.textContent='Click to choose a file, or drag one here';
  drop.appendChild(document.getElementById('json-file-input'));
  pendingFileJson=null; switchTab('paste'); modalOverlay.classList.add('show');
};
document.getElementById('modal-cancel').onclick=()=>modalOverlay.classList.remove('show');
modalOverlay.addEventListener('mousedown',e=>{if(e.target===modalOverlay)modalOverlay.classList.remove('show');});
document.querySelectorAll('.m-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-paste').style.display=tab==='paste'?'':'none';
  document.getElementById('tab-file').style.display =tab==='file' ?'':'none';
}
const modalFileDrop=document.getElementById('modal-file-drop');
const jsonFileInput=document.getElementById('json-file-input');
modalFileDrop.addEventListener('click',()=>jsonFileInput.click());
modalFileDrop.addEventListener('dragover',e=>{e.preventDefault();modalFileDrop.style.borderColor='var(--blue)';});
modalFileDrop.addEventListener('dragleave',()=>{modalFileDrop.style.borderColor='';});
modalFileDrop.addEventListener('drop',e=>{
  e.preventDefault();e.stopPropagation();modalFileDrop.style.borderColor='';
  const f=e.dataTransfer.files[0];if(f)readJsonFile(f);
});
jsonFileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readJsonFile(f);e.target.value='';});
function readJsonFile(f){
  const r=new FileReader();
  r.onload=ev=>{pendingFileJson=ev.target.result;modalFileDrop.textContent='✓ '+f.name;document.getElementById('file-error').textContent='';};
  r.readAsText(f);
}
document.getElementById('modal-confirm').onclick=()=>{
  let err;
  if(activeTab==='paste'){
    const raw=document.getElementById('paste-area').value.trim();
    if(!raw){document.getElementById('paste-error').textContent='Paste JSON first.';return;}
    err=loadJsonData(raw);
    if(err){document.getElementById('paste-error').textContent='Error: '+err;return;}
  }else{
    if(!pendingFileJson){document.getElementById('file-error').textContent='Choose a file first.';return;}
    err=loadJsonData(pendingFileJson);
    if(err){document.getElementById('file-error').textContent='Error: '+err;return;}
  }
  modalOverlay.classList.remove('show'); showToast('JSON loaded ✓');
};

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
setTool('select');
applyTheme();
</script>
</body>
