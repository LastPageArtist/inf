<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%;height:100%;overflow:hidden;background:#f9f9f7;cursor:grab;user-select:none; }
body.panning { cursor:grabbing; }

#grid-bg { position:fixed;inset:0;pointer-events:none;z-index:0;will-change:background-position,background-size; }
#world   { position:absolute;top:0;left:0;transform-origin:0 0;z-index:1;will-change:transform; }

/*
  Counter-scaled border:
  --s is set to the current zoom on #world every frame.
  calc(1px / var(--s)) always equals exactly 1 screen-pixel,
  so text box borders remain visible no matter how far you zoom out.
*/
.c-text {
  position:absolute;
  border: calc(1px / var(--s,1)) solid rgba(0,0,0,0.28);
  padding:10px 12px;
  font-family:'Instrument Serif',serif;
  color:#1a1a18;line-height:1.5;
  word-break:break-word;white-space:pre-wrap;
  pointer-events:none;background:transparent;overflow:hidden;
}
.c-text b,.c-text strong{font-weight:bold;}
.c-text i,.c-text em{font-style:italic;}
.c-text u{text-decoration:underline;}

.c-image { position:absolute;display:block;object-fit:cover;pointer-events:none; }
.img-missing {
  position:absolute;display:flex;align-items:center;justify-content:center;
  border:calc(1px / var(--s,1)) dashed rgba(0,0,0,0.2);
  background:rgba(0,0,0,0.02);color:#bbb;font-size:12px;
  font-family:'Instrument Serif',serif;pointer-events:none;
}

#zoom-hud { position:fixed;bottom:20px;right:20px;z-index:100;display:flex;align-items:center;gap:6px; }
.z-btn {
  width:28px;height:28px;border:1px solid rgba(0,0,0,0.15);
  background:rgba(249,249,247,0.92);backdrop-filter:blur(6px);
  border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#444;transition:background .1s;font-size:16px;
}
.z-btn svg{width:13px;height:13px;}
.z-btn:hover{background:#e8e8e4;}
#zoom-label{min-width:42px;text-align:center;font-family:'Instrument Serif',serif;color:#999;font-size:12px;}
</style>
</head>
<body>
<div id="grid-bg"></div>
<div id="world"></div>
<div id="zoom-hud">
  <button class="z-btn" id="btn-out">&#x2212;</button>
  <span id="zoom-label">100%</span>
  <button class="z-btn" id="btn-in">+</button>
  <button class="z-btn" id="btn-fit" title="Fit all objects in view">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/>
      <rect x="5" y="5" width="6" height="6" rx="0.5"/>
    </svg>
  </button>
</div>
<script>
let tx=0,ty=0,scale=1;
const MIN=0.04,MAX=8,STEP=0.15,BASE=28;
const world=document.getElementById('world');
const label=document.getElementById('zoom-label');
const grid=document.getElementById('grid-bg');
let allObjects=[];

function apply(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  world.style.setProperty('--s',scale);
  label.textContent=Math.round(scale*100)+'%';
  const sz=BASE*scale,op=scale<0.15?0:Math.min(0.22,0.08+scale*0.12);
  const ox=((tx%sz)+sz)%sz,oy=((ty%sz)+sz)%sz;
  grid.style.backgroundSize=`${sz}px ${sz}px`;
  grid.style.backgroundPosition=`${ox}px ${oy}px`;
  grid.style.backgroundImage=`radial-gradient(circle,rgba(0,0,0,${op.toFixed(3)}) 1px,transparent 1px)`;
}

let pan=false,sx,sy,stx,sty;
document.addEventListener('mousedown',e=>{
  if(e.target.closest('#zoom-hud'))return;
  pan=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;
  document.body.classList.add('panning');
});
document.addEventListener('mousemove',e=>{ if(!pan)return; tx=stx+e.clientX-sx;ty=sty+e.clientY-sy;apply(); });
document.addEventListener('mouseup',()=>{ pan=false;document.body.classList.remove('panning'); });

function zoomTo(ns,cx,cy){
  ns=Math.min(MAX,Math.max(MIN,ns));
  tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;apply();
}
document.addEventListener('wheel',e=>{
  e.preventDefault();let dy=e.deltaY;
  if(e.deltaMode===1)dy*=20;if(e.deltaMode===2)dy*=300;
  zoomTo(scale*Math.pow(1-STEP,dy/100),e.clientX,e.clientY);
},{passive:false});

document.getElementById('btn-in').onclick=()=>zoomTo(scale*(1+STEP),innerWidth/2,innerHeight/2);
document.getElementById('btn-out').onclick=()=>zoomTo(scale*(1-STEP),innerWidth/2,innerHeight/2);

function fitAll(){
  if(!allObjects.length){tx=0;ty=0;scale=1;apply();return;}
  const PAD=60;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  allObjects.forEach(o=>{
    x0=Math.min(x0,o.x);y0=Math.min(y0,o.y);
    x1=Math.max(x1,o.x+(o.width||200));y1=Math.max(y1,o.y+(o.height||100));
  });
  const cw=innerWidth,ch=innerHeight;
  const ns=Math.min(MAX,Math.max(MIN,Math.min((cw-PAD*2)/(x1-x0),(ch-PAD*2)/(y1-y0))));
  tx=PAD+((cw-PAD*2)-(x1-x0)*ns)/2-x0*ns;
  ty=PAD+((ch-PAD*2)-(y1-y0)*ns)/2-y0*ns;
  scale=ns;apply();
}
document.getElementById('btn-fit').onclick=fitAll;

function renderText(o){
  const el=document.createElement('div');
  el.className='c-text';
  el.style.left=o.x+'px';el.style.top=o.y+'px';
  el.style.width=(o.width||200)+'px';
  el.style.fontSize=(o.fontSize||14)+'px';
  if(o.height)el.style.height=o.height+'px';
  el.innerHTML=o.content||'';
  world.appendChild(el);
}
function renderImage(o){
  const img=document.createElement('img');
  img.className='c-image';img.draggable=false;
  img.style.left=o.x+'px';img.style.top=o.y+'px';
  img.style.width=(o.width||200)+'px';img.style.height=(o.height||200)+'px';
  img.src='imgs/'+o.src;
  img.onerror=()=>{
    img.remove();
    const ph=document.createElement('div');
    ph.className='img-missing';
    ph.style.cssText=`left:${o.x}px;top:${o.y}px;width:${o.width||200}px;height:${o.height||200}px`;
    ph.textContent=o.src;world.appendChild(ph);
  };
  world.appendChild(img);
}

async function load(){
  try{
    const r=await fetch('objects.json?_='+Date.now(),{
      cache:'no-store',
      headers:{'Pragma':'no-cache','Cache-Control':'no-cache'}
    });
    if(!r.ok)throw 0;
    const{objects=[]}=await r.json();
    allObjects=objects;
    objects.forEach(o=>{ if(o.type==='text')renderText(o); else if(o.type==='image')renderImage(o); });
    fitAll();
  }catch{console.warn('Could not load objects.json');}
}
apply();load();
</script>
</body>
</html>
