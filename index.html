<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cavonasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0ece3; --surface:#e7e2d8; --text:#2c2820; --text-dim:#8a8278;
  --border:rgba(44,40,32,0.20); --hud-bg:rgba(240,236,227,0.92); --hud-hov:#dedad0;
  --f:'Libre Baskerville',serif;
  --tb-h:32px; --tb-pad:4px; --tb-gap:3px; --tb-r:10px; --tb-fs:11px; --tb-icon:13px; --tb-bottom:18px;
  --brand-fs:18px; --brand-top:20px; --brand-left:22px;
}
body.dev-mobile{--tb-h:40px;--tb-gap:2px;--tb-r:14px;--tb-fs:12px;--tb-icon:15px;--tb-bottom:24px;--brand-fs:13px;--brand-top:15px;--brand-left:15px;}
body.dev-tablet{--tb-h:36px;--tb-r:11px;--tb-fs:12px;--tb-icon:14px;--tb-bottom:22px;--brand-fs:16px;}
body.dev-tv    {--tb-h:44px;--tb-pad:7px;--tb-gap:5px;--tb-r:13px;--tb-fs:14px;--tb-icon:17px;--tb-bottom:28px;--brand-fs:26px;--brand-top:28px;--brand-left:32px;}
[data-theme="dark"]{--bg:#1c1b18;--surface:#27261f;--text:#e0dbd0;--text-dim:#7a7870;--border:rgba(224,219,208,0.18);--hud-bg:rgba(28,27,24,0.92);--hud-hov:#332f28;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);touch-action:none;user-select:none;-webkit-user-select:none;transition:background .3s;}
body:not(.dev-mobile):not(.dev-tablet){cursor:grab;}
body:not(.dev-mobile):not(.dev-tablet).panning{cursor:grabbing;}

#grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
#world  {position:absolute;top:0;left:0;transform-origin:0 0;z-index:1;will-change:transform;}

/* SVG layer for lines */
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}

.c-text{
  position:absolute;outline:1px solid rgba(44,40,32,0.30);border:none;
  padding:10px 12px;font-family:var(--f);color:var(--text);
  font-size:16px;font-weight:400;letter-spacing:.04em;line-height:1.55;
  word-break:break-word;pointer-events:none;background:transparent;overflow:hidden;transition:color .3s;
}
[data-theme="dark"] .c-text{outline-color:rgba(224,219,208,0.38);}
.c-text b,.c-text strong{font-weight:700;}
.c-text i,.c-text em    {font-style:italic;}
.c-text u               {text-decoration:underline;}

.c-image{position:absolute;display:block;object-fit:cover;pointer-events:none;}
.img-missing{position:absolute;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);background:rgba(0,0,0,.02);color:var(--text-dim);font-size:12px;font-family:var(--f);pointer-events:none;}

/* Brand */
#brand{position:fixed;top:var(--brand-top);left:var(--brand-left);z-index:100;font-family:var(--f);font-size:var(--brand-fs);font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--text);opacity:.68;pointer-events:none;transition:color .3s,font-size .3s;}

/* Bottom toolbar pill */
#toolbar{
  position:fixed;bottom:var(--tb-bottom);left:50%;transform:translateX(-50%);
  z-index:200;display:flex;align-items:center;gap:var(--tb-gap);
  padding:var(--tb-pad) calc(var(--tb-pad) + 2px);
  background:var(--hud-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:var(--tb-r);
  box-shadow:0 2px 16px rgba(0,0,0,.10);transition:background .3s,border-color .3s;
}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0;}
.tb-btn{
  height:var(--tb-h);min-width:var(--tb-h);padding:0 7px;
  border:none;border-radius:calc(var(--tb-r) - 3px);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
  color:var(--text);font-family:var(--f);font-size:var(--tb-fs);letter-spacing:.04em;
  transition:background .12s,color .3s;-webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.tb-btn:hover,.tb-btn:active{background:var(--hud-hov);}
.tb-btn svg{width:var(--tb-icon);height:var(--tb-icon);flex-shrink:0;}
#zoom-label{font-family:var(--f);font-size:var(--tb-fs);letter-spacing:.06em;color:var(--text-dim);min-width:34px;text-align:center;transition:color .3s;pointer-events:none;}
body.dev-mobile #zoom-label{display:none;}
</style>
</head>
<body>
<div id="grid-bg"></div>
<div id="world">
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="brand">Cavonasa</div>

<!-- Music (hidden, user-initiated) -->
<audio id="bg-music" loop preload="none" src="Hill_of_the_king.mp3"></audio>

<div id="toolbar">
  <!-- Zoom out -->
  <button class="tb-btn" id="btn-out" title="Zoom out">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="4" y1="7" x2="10" y2="7"/></svg>
  </button>
  <span id="zoom-label">100%</span>
  <button class="tb-btn" id="btn-in" title="Zoom in">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="7" y1="4" x2="7" y2="10"/><line x1="4" y1="7" x2="10" y2="7"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-fit" title="Fit all content">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/><rect x="5" y="5" width="6" height="6" rx="0.5"/></svg>
  </button>
  <div class="tb-sep"></div>
  <!-- Music toggle — muted by default -->
  <button class="tb-btn" id="btn-music" title="Play music">
    <!-- Muted icon (default) -->
    <svg id="ico-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="none"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <!-- Playing icon (shown when music on) -->
    <svg id="ico-playing" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="none"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </button>
  <div class="tb-sep"></div>
  <!-- Theme toggle -->
  <button class="tb-btn" id="btn-theme" title="Toggle theme">
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</div>

<script>
// ═══════════════════════════════════════
//  DEVICE DETECTION
// ═══════════════════════════════════════
function detectDevice(){
  const w=innerWidth,touch=navigator.maxTouchPoints>0;
  const tv=/SmartTV|Tizen|WebOS|HbbTV|BRAVIA/i.test(navigator.userAgent);
  let cls= tv||(w>=1920&&!touch)?'dev-tv': touch&&w<=600?'dev-mobile': touch&&w<=1200?'dev-tablet':'dev-desktop';
  document.body.classList.remove('dev-mobile','dev-tablet','dev-desktop','dev-tv');
  document.body.classList.add(cls);
}
detectDevice();
window.addEventListener('resize',detectDevice);

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const MIN=0.04,MAX=8,STEP=0.15,BASE=28;
let tx=0,ty=0,scale=1,dark=false,allObjects=[],textEls=[];

const html   =document.documentElement;
const world  =document.getElementById('world');
const svgL   =document.getElementById('svg-layer');
const label  =document.getElementById('zoom-label');
const grid   =document.getElementById('grid-bg');
const moonIco=document.getElementById('icon-moon');
const sunIco =document.getElementById('icon-sun');

// ═══════════════════════════════════════
//  THEME — never default to dark
// ═══════════════════════════════════════
function applyTheme(){
  html.setAttribute('data-theme',dark?'dark':'light');
  moonIco.style.display=dark?'none':'';
  sunIco.style.display =dark?'':'none';
  applyTransform();
}
document.getElementById('btn-theme').onclick=()=>{
  dark=!dark;applyTheme();
  try{localStorage.setItem('cv-theme',dark?'dark':'light');}catch{}
};
try{ dark = localStorage.getItem('cv-theme')==='dark'; }catch{}
// Safety: if somehow stored as dark, still check explicitly
if(localStorage.getItem('cv-theme')!=='dark') dark=false;

// ═══════════════════════════════════════
//  MUSIC
// ═══════════════════════════════════════
const bgMusic  =document.getElementById('bg-music');
const icoMuted =document.getElementById('ico-muted');
const icoPlaying=document.getElementById('ico-playing');
let musicOn=false;

document.getElementById('btn-music').onclick=()=>{
  if(musicOn){
    bgMusic.pause();
    musicOn=false;
    icoMuted.style.display=''; icoPlaying.style.display='none';
  } else {
    // Play — the user gesture here satisfies autoplay policy
    bgMusic.volume=0.45;
    bgMusic.play().then(()=>{
      musicOn=true;
      icoMuted.style.display='none'; icoPlaying.style.display='';
    }).catch(()=>{
      // Fallback: try unmuting after a tiny delay
      setTimeout(()=>{
        bgMusic.muted=false;
        bgMusic.play().catch(()=>{});
        musicOn=true;
        icoMuted.style.display='none'; icoPlaying.style.display='';
      },100);
    });
  }
};

// ═══════════════════════════════════════
//  TRANSFORM
// ═══════════════════════════════════════
function applyTransform(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  label.textContent=Math.round(scale*100)+'%';
  const sz=BASE*scale, op=scale<0.1?0:Math.min(0.28,0.08+scale*0.15);
  const ox=((tx%sz)+sz)%sz, oy=((ty%sz)+sz)%sz;
  const dc=dark?`rgba(224,219,208,${op.toFixed(3)})`:`rgba(44,40,32,${op.toFixed(3)})`;
  grid.style.backgroundImage   =`radial-gradient(circle,${dc} 1.2px,transparent 1.2px)`;
  grid.style.backgroundSize    =`${sz}px ${sz}px`;
  grid.style.backgroundPosition=`${ox}px ${oy}px`;
  // Counter-scale outlines
  const ow=(1/scale).toFixed(6)+'px', oc=dark?'rgba(224,219,208,0.45)':'rgba(44,40,32,0.34)';
  textEls.forEach(el=>{el.style.outline=`${ow} solid ${oc}`;});
}

// ═══════════════════════════════════════
//  PAN  (mouse)
// ═══════════════════════════════════════
let pan=false,msx,msy,stx,sty;
document.addEventListener('mousedown',e=>{
  if(e.target.closest('#toolbar'))return;
  pan=true;msx=e.clientX;msy=e.clientY;stx=tx;sty=ty;
  document.body.classList.add('panning');
});
document.addEventListener('mousemove',e=>{if(!pan)return;tx=stx+e.clientX-msx;ty=sty+e.clientY-msy;applyTransform();});
document.addEventListener('mouseup',()=>{pan=false;document.body.classList.remove('panning');});

// ═══════════════════════════════════════
//  TOUCH  (pan + pinch)
// ═══════════════════════════════════════
let touches={},lastMid=null,lastSpread=0;
function mid(t){const p=Object.values(t);return{x:p.reduce((s,v)=>s+v.x,0)/p.length,y:p.reduce((s,v)=>s+v.y,0)/p.length};}
function spd(t){const p=Object.values(t);return p.length<2?0:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);}
document.addEventListener('touchstart',e=>{if(e.target.closest('#toolbar'))return;e.preventDefault();[...e.changedTouches].forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});lastMid=mid(touches);lastSpread=spd(touches);},{passive:false});
document.addEventListener('touchmove',e=>{
  if(e.target.closest('#toolbar'))return; e.preventDefault();
  [...e.changedTouches].forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});
  const m=mid(touches),s=spd(touches);
  if(Object.keys(touches).length>=2&&lastSpread>0){const f=s/lastSpread,ns=Math.min(MAX,Math.max(MIN,scale*f));tx=m.x-(m.x-tx)*(ns/scale);ty=m.y-(m.y-ty)*(ns/scale);scale=ns;}
  if(lastMid){tx+=m.x-lastMid.x;ty+=m.y-lastMid.y;}
  lastMid=m;lastSpread=s;applyTransform();
},{passive:false});
document.addEventListener('touchend',e=>{[...e.changedTouches].forEach(t=>{delete touches[t.identifier];});lastMid=Object.keys(touches).length?mid(touches):null;lastSpread=spd(touches);},{passive:false});

// ═══════════════════════════════════════
//  WHEEL ZOOM
// ═══════════════════════════════════════
document.addEventListener('wheel',e=>{
  e.preventDefault();let dy=e.deltaY;
  if(e.deltaMode===1)dy*=20;if(e.deltaMode===2)dy*=300;
  zoomTo(scale*Math.pow(1-STEP,dy/100),e.clientX,e.clientY);
},{passive:false});
function zoomTo(ns,cx,cy){ns=Math.min(MAX,Math.max(MIN,ns));tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;applyTransform();}
document.getElementById('btn-in').onclick =()=>zoomTo(scale*(1+STEP),innerWidth/2,innerHeight/2);
document.getElementById('btn-out').onclick=()=>zoomTo(scale*(1-STEP),innerWidth/2,innerHeight/2);

// ═══════════════════════════════════════
//  SMART FIT
// ═══════════════════════════════════════
function fitAll(){
  if(!allObjects.length){tx=0;ty=0;scale=1;applyTransform();return;}
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  allObjects.forEach(o=>{
    if(o.type==='line'){x0=Math.min(x0,o.x1,o.x2);y0=Math.min(y0,o.y1,o.y2);x1=Math.max(x1,o.x1,o.x2);y1=Math.max(y1,o.y1,o.y2);}
    else if(o.type!=='start'){x0=Math.min(x0,o.x);y0=Math.min(y0,o.y);x1=Math.max(x1,o.x+(o.width||200));y1=Math.max(y1,o.y+(o.height||100));}
  });
  const cw=x1-x0,ch=y1-y0;
  const PAD=Math.max(48,Math.min(160,Math.max(cw,ch)*0.08));
  const vw=innerWidth-PAD*2,vh=innerHeight-PAD*2;
  const ns=Math.min(MAX,Math.max(MIN,Math.min(vw/cw,vh/ch)));
  tx=PAD+(vw-cw*ns)/2-x0*ns; ty=PAD+(vh-ch*ns)/2-y0*ns;
  scale=ns; applyTransform();
}
document.getElementById('btn-fit').onclick=fitAll;

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function renderText(o){
  const el=document.createElement('div');
  el.className='c-text';
  el.style.left=(o.x)+'px'; el.style.top=(o.y)+'px';
  el.style.width=(o.width||200)+'px';
  el.style.fontSize=(o.fontSize||16)+'px';
  if(o.height)el.style.height=o.height+'px';
  if(o.color)el.style.color=o.color;
  el.innerHTML=o.content||'';
  world.appendChild(el);
  textEls.push(el);
}
function renderImage(o){
  const img=document.createElement('img');
  img.className='c-image';img.draggable=false;
  img.style.left=o.x+'px';img.style.top=o.y+'px';
  img.style.width=(o.width||200)+'px';img.style.height=(o.height||200)+'px';
  img.src='imgs/'+o.src;
  img.onerror=()=>{img.remove();const ph=document.createElement('div');ph.className='img-missing';ph.style.cssText=`left:${o.x}px;top:${o.y}px;width:${o.width||200}px;height:${o.height||200}px`;ph.textContent=o.src;world.appendChild(ph);};
  world.appendChild(img);
}
function renderLine(o){
  const el=document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',o.x1);el.setAttribute('y1',o.y1);
  el.setAttribute('x2',o.x2);el.setAttribute('y2',o.y2);
  el.setAttribute('stroke',o.color||'rgba(44,40,32,0.75)');
  el.setAttribute('stroke-width',o.width||2);
  el.setAttribute('stroke-linecap','round');
  svgL.appendChild(el);
}

// ═══════════════════════════════════════
//  LOAD  + START NODE
// ═══════════════════════════════════════
async function load(){
  try{
    const r=await fetch('objects.json?_='+Date.now(),{cache:'no-store'});
    if(!r.ok)throw 0;
    const{objects=[]}=await r.json();
    allObjects=objects;
    // Find start node — if present, use it to set initial view
    const startNode=objects.find(o=>o.type==='start');
    objects.forEach(o=>{
      if(o.type==='text')renderText(o);
      else if(o.type==='image')renderImage(o);
      else if(o.type==='line')renderLine(o);
      // start node is invisible on viewer — it only sets the initial position
    });
    if(startNode){
      // Centre viewport on the start node position at scale=1
      scale=1;
      tx=innerWidth/2 -startNode.x;
      ty=innerHeight/2-startNode.y;
      applyTransform();
    } else {
      fitAll();
    }
  }catch{console.warn('Could not load objects.json');}
}

applyTheme();
load();
</script>
</body>
</html>
