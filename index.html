<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f9f9f7;
    font-family: 'Instrument Serif', serif;
    cursor: grab;
    user-select: none;
  }

  body.panning { cursor: grabbing; }

  /* ── dot grid ── */
  #grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── world: the transformable layer ── */
  #world {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    z-index: 1;
  }

  /* ── text boxes ── */
  .c-text {
    position: absolute;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.12);
    padding: 10px 12px;
    font-family: 'Instrument Serif', serif;
    color: #1a1a18;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: default;
    outline: none;
    resize: none;
    overflow: hidden;
    min-height: 36px;
    transition: border-color 0.15s;
  }
  .c-text:hover { border-color: rgba(0,0,0,0.28); }
  .c-text:focus {
    border-color: rgba(0,0,0,0.55);
    cursor: text;
    user-select: text;
  }

  /* ── images ── */
  .c-image {
    position: absolute;
    display: block;
    object-fit: cover;
    cursor: default;
  }

  /* ── zoom controls ── */
  #zoom-hud {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Instrument Serif', serif;
    font-size: 13px;
    color: #555;
  }

  .z-btn {
    width: 26px; height: 26px;
    border: 1px solid rgba(0,0,0,0.18);
    background: rgba(249,249,247,0.9);
    backdrop-filter: blur(4px);
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    color: #333;
    transition: background 0.1s, border-color 0.1s;
  }
  .z-btn:hover { background: #efefec; border-color: rgba(0,0,0,0.3); }

  #zoom-label {
    min-width: 42px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #888;
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  /* error pill */
  .img-missing {
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed rgba(0,0,0,0.18);
    color: #aaa;
    font-size: 12px;
    font-family: 'Instrument Serif', serif;
    position: absolute;
    background: rgba(0,0,0,0.02);
  }
</style>
</head>
<body>

<canvas id="grid"></canvas>
<div id="world"></div>

<div id="zoom-hud">
  <button class="z-btn" id="btn-out">−</button>
  <span id="zoom-label">100%</span>
  <button class="z-btn" id="btn-in">+</button>
  <button class="z-btn" id="btn-reset" title="Reset view" style="font-size:12px;">⌂</button>
</div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let tx = 0, ty = 0, scale = 1;
const MIN_SCALE = 0.05, MAX_SCALE = 8;
const ZOOM_STEP = 0.15;

const world = document.getElementById('world');
const label = document.getElementById('zoom-label');

// ─────────────────────────────────────────────
//  Dot Grid
// ─────────────────────────────────────────────
const gridCanvas = document.getElementById('grid');
const ctx = gridCanvas.getContext('2d');

function drawGrid() {
  const W = window.innerWidth, H = window.innerHeight;
  gridCanvas.width = W; gridCanvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const spacing = 28 * scale;
  if (spacing < 6) return; // too dense — skip

  const opacity = Math.min(0.35, 0.12 + (scale - 0.3) * 0.1);
  ctx.fillStyle = `rgba(0,0,0,${opacity})`;
  const dotR = Math.min(1.2, 0.7 * scale + 0.3);

  const offsetX = ((tx % spacing) + spacing) % spacing;
  const offsetY = ((ty % spacing) + spacing) % spacing;

  for (let x = offsetX - spacing; x < W + spacing; x += spacing) {
    for (let y = offsetY - spacing; y < H + spacing; y += spacing) {
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ─────────────────────────────────────────────
//  Apply transform
// ─────────────────────────────────────────────
function applyTransform() {
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  label.textContent = Math.round(scale * 100) + '%';
  drawGrid();
}

// ─────────────────────────────────────────────
//  Pan
// ─────────────────────────────────────────────
let isPanning = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

document.addEventListener('mousedown', e => {
  if (e.target.classList.contains('c-text') && document.activeElement === e.target) return;
  if (e.target.closest('#zoom-hud')) return;
  isPanning = true;
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
  document.body.classList.add('panning');
});

document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});

document.addEventListener('mouseup', () => {
  isPanning = false;
  document.body.classList.remove('panning');
});

// Touch pan
let touches = {};
document.addEventListener('touchstart', e => {
  [...e.changedTouches].forEach(t => touches[t.identifier] = { x: t.clientX, y: t.clientY });
  if (Object.keys(touches).length === 1) {
    const t = e.changedTouches[0];
    startX = t.clientX; startY = t.clientY;
    startTx = tx; startTy = ty;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    const t = e.touches[0];
    tx = startTx + (t.clientX - startX);
    ty = startTy + (t.clientY - startY);
    applyTransform();
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  [...e.changedTouches].forEach(t => delete touches[t.identifier]);
}, { passive: true });

// ─────────────────────────────────────────────
//  Zoom (wheel)
// ─────────────────────────────────────────────
document.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = document.documentElement.getBoundingClientRect();
  const cx = e.clientX, cy = e.clientY;

  const delta = -e.deltaY;
  const factor = 1 + (delta > 0 ? ZOOM_STEP : -ZOOM_STEP) * Math.min(3, Math.abs(e.deltaY) / 50);
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));

  // zoom toward cursor
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// ─────────────────────────────────────────────
//  Zoom buttons
// ─────────────────────────────────────────────
function zoomAt(factor) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}

document.getElementById('btn-in').onclick = () => zoomAt(1 + ZOOM_STEP);
document.getElementById('btn-out').onclick = () => zoomAt(1 - ZOOM_STEP);
document.getElementById('btn-reset').onclick = () => { tx = 0; ty = 0; scale = 1; applyTransform(); };

// ─────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────
window.addEventListener('resize', drawGrid);

// ─────────────────────────────────────────────
//  Render objects from JSON
// ─────────────────────────────────────────────
function renderText(obj) {
  const el = document.createElement('div');
  el.className = 'c-text';
  el.id = obj.id || '';
  el.style.left = obj.x + 'px';
  el.style.top  = obj.y + 'px';
  el.style.width = (obj.width || 200) + 'px';
  el.style.fontSize = (obj.fontSize || 14) + 'px';
  el.textContent = obj.content || '';
  el.setAttribute('contenteditable', 'true');
  el.setAttribute('spellcheck', 'false');

  // prevent pan when focused
  el.addEventListener('mousedown', e => e.stopPropagation());
  el.addEventListener('click', e => e.stopPropagation());

  world.appendChild(el);
}

function renderImage(obj) {
  // Resolve src: just filename → same directory as index.html
  const src = obj.src || '';

  if (!src) return;

  const img = document.createElement('img');
  img.className = 'c-image';
  img.id = obj.id || '';
  img.style.left   = obj.x + 'px';
  img.style.top    = obj.y + 'px';
  img.style.width  = (obj.width  || 200) + 'px';
  img.style.height = (obj.height || 200) + 'px';
  img.draggable = false;
  img.src = src;

  img.onerror = () => {
    // replace with a placeholder box
    img.remove();
    const ph = document.createElement('div');
    ph.className = 'img-missing';
    ph.id = obj.id || '';
    ph.style.left   = obj.x + 'px';
    ph.style.top    = obj.y + 'px';
    ph.style.width  = (obj.width  || 200) + 'px';
    ph.style.height = (obj.height || 200) + 'px';
    ph.textContent  = src;
    world.appendChild(ph);
  };

  world.appendChild(img);
}

async function loadObjects() {
  try {
    const res = await fetch('objects.json');
    if (!res.ok) throw new Error('objects.json not found');
    const data = await res.json();
    const objects = data.objects || [];
    objects.forEach(obj => {
      if (obj.type === 'text')  renderText(obj);
      if (obj.type === 'image') renderImage(obj);
    });
  } catch (err) {
    console.warn('Could not load objects.json:', err.message);
  }
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
applyTransform();
loadObjects();
</script>
</body>
</html>
