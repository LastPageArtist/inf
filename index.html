<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cavonasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS  (device classes added by JS)
   body.dev-mobile  body.dev-tablet  body.dev-desktop  body.dev-tv
───────────────────────────────────────── */
:root {
  --bg:        #f0ece3;
  --surface:   #e7e2d8;
  --text:      #2c2820;
  --text-dim:  #8a8278;
  --border:    rgba(44,40,32,0.20);
  --hud-bg:    rgba(240,236,227,0.92);
  --hud-hov:   #dedad0;
  --f:         'Libre Baskerville', serif;

  /* toolbar sizing — overridden per device */
  --tb-h:      34px;      /* button height       */
  --tb-pad:    5px;       /* inner gap           */
  --tb-gap:    4px;       /* gap between buttons */
  --tb-radius: 10px;      /* pill radius         */
  --tb-fs:     11px;      /* font size           */
  --tb-icon:   13px;      /* svg icon size       */
  --tb-bottom: 18px;      /* dist from bottom    */

  /* brand sizing */
  --brand-fs:  18px;
  --brand-top: 20px;
  --brand-left:22px;
}

/* ── Device overrides ── */
body.dev-mobile {
  --tb-h:      40px;
  --tb-pad:    6px;
  --tb-gap:    2px;
  --tb-radius: 14px;
  --tb-fs:     12px;
  --tb-icon:   15px;
  --tb-bottom: 24px;
  --brand-fs:  14px;
  --brand-top: 16px;
  --brand-left:16px;
}
body.dev-tablet {
  --tb-h:      36px;
  --tb-gap:    3px;
  --tb-radius: 11px;
  --tb-fs:     12px;
  --tb-icon:   14px;
  --tb-bottom: 22px;
  --brand-fs:  16px;
}
body.dev-tv {
  --tb-h:      44px;
  --tb-pad:    8px;
  --tb-gap:    6px;
  --tb-radius: 13px;
  --tb-fs:     14px;
  --tb-icon:   17px;
  --tb-bottom: 28px;
  --brand-fs:  26px;
  --brand-top: 28px;
  --brand-left:32px;
}

[data-theme="dark"] {
  --bg:       #1c1b18;
  --surface:  #27261f;
  --text:     #e0dbd0;
  --text-dim: #7a7870;
  --border:   rgba(224,219,208,0.18);
  --hud-bg:   rgba(28,27,24,0.92);
  --hud-hov:  #332f28;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg);
  touch-action:none;        /* we manage all touch ourselves */
  user-select:none; -webkit-user-select:none;
  transition:background .3s;
}
body:not(.dev-mobile):not(.dev-tablet) { cursor:grab; }
body:not(.dev-mobile):not(.dev-tablet).panning { cursor:grabbing; }

#grid-bg { position:fixed; inset:0; pointer-events:none; z-index:0; }
#world   { position:absolute; top:0; left:0; transform-origin:0 0; z-index:1; will-change:transform; }

/* ── Text boxes ── */
.c-text {
  position:absolute;
  outline:1px solid rgba(44,40,32,0.30);
  border:none;
  padding:10px 12px;
  font-family:var(--f);
  color:var(--text);
  font-size:16px;
  font-weight:400;
  letter-spacing:.05em;
  line-height:1.55;
  word-break:break-word;
  pointer-events:none;
  background:transparent;
  overflow:hidden;
  transition:color .3s;
}
[data-theme="dark"] .c-text { outline-color:rgba(224,219,208,0.38); }
.c-text b, .c-text strong { font-weight:700; }
.c-text i, .c-text em     { font-style:italic; }
.c-text u                 { text-decoration:underline; }

.c-image   { position:absolute; display:block; object-fit:cover; pointer-events:none; }
.img-missing {
  position:absolute; display:flex; align-items:center; justify-content:center;
  border:1px dashed var(--border); background:rgba(0,0,0,.02);
  color:var(--text-dim); font-size:12px; font-family:var(--f); pointer-events:none;
}

/* ── Brand ── */
#brand {
  position:fixed; top:var(--brand-top); left:var(--brand-left); z-index:100;
  font-family:var(--f); font-size:var(--brand-fs); font-weight:700;
  letter-spacing:.20em; text-transform:uppercase;
  color:var(--text); opacity:.68; pointer-events:none;
  transition:color .3s, font-size .3s;
}

/* ─────────────────────────────────────────
   CENTRAL BOTTOM TOOLBAR
───────────────────────────────────────── */
#toolbar {
  position:fixed;
  bottom:var(--tb-bottom);
  left:50%; transform:translateX(-50%);
  z-index:200;

  display:flex; align-items:center;
  gap:var(--tb-gap);
  padding:var(--tb-pad) calc(var(--tb-pad) + 2px);

  background:var(--hud-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--tb-radius);
  box-shadow:0 2px 16px rgba(0,0,0,.10);
  transition:background .3s, border-color .3s;
}

/* thin separator */
.tb-sep {
  width:1px; height:16px;
  background:var(--border);
  margin:0 2px; flex-shrink:0;
}

/* every button in the toolbar */
.tb-btn {
  height:var(--tb-h);
  min-width:var(--tb-h);
  padding:0 8px;
  border:none; border-radius:calc(var(--tb-radius) - 3px);
  background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:4px;
  color:var(--text); font-family:var(--f);
  font-size:var(--tb-fs); letter-spacing:.04em;
  transition:background .12s, color .3s;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.tb-btn:hover, .tb-btn:active { background:var(--hud-hov); }
.tb-btn svg { width:var(--tb-icon); height:var(--tb-icon); flex-shrink:0; }

/* zoom label */
#zoom-label {
  font-family:var(--f); font-size:var(--tb-fs);
  letter-spacing:.06em; color:var(--text-dim);
  min-width:36px; text-align:center;
  transition:color .3s;
  pointer-events:none;
}

/* on mobile hide the text label to save space */
body.dev-mobile #zoom-label { display:none; }
</style>
</head>
<body>

<div id="grid-bg"></div>
<div id="world"></div>

<div id="brand">Cavonasa</div>

<!-- ── Central bottom toolbar — all controls in one pill ── -->
<div id="toolbar">

  <!-- Zoom out -->
  <button class="tb-btn" id="btn-out" title="Zoom out">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="4" y1="7" x2="10" y2="7"/>
    </svg>
  </button>

  <span id="zoom-label">100%</span>

  <!-- Zoom in -->
  <button class="tb-btn" id="btn-in" title="Zoom in">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="7" y1="4" x2="7" y2="10"/><line x1="4" y1="7" x2="10" y2="7"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Fit / recentre -->
  <button class="tb-btn" id="btn-fit" title="Fit all content">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/>
      <rect x="5" y="5" width="6" height="6" rx="0.5"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Theme toggle -->
  <button class="tb-btn" id="btn-theme" title="Toggle theme">
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1"  x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  DEVICE DETECTION
//  Classifies the viewport into mobile / tablet / desktop / tv
//  and stamps a class on <body>. Re-evaluates on resize.
// ═══════════════════════════════════════════════════════
function detectDevice() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const ua = navigator.userAgent;
  const touch = navigator.maxTouchPoints > 0;

  // Coarse UA sniff for TV / large display
  const isTV = /SmartTV|SMART-TV|Tizen|WebOS|HbbTV|BRAVIA|PhilipsTV|SamsungBrowser\/[0-9]+.*TV/i.test(ua);

  let cls;
  if (isTV || (w >= 1920 && !touch)) {
    cls = 'dev-tv';
  } else if (touch && w <= 600) {
    cls = 'dev-mobile';
  } else if (touch && w <= 1200) {
    cls = 'dev-tablet';
  } else {
    cls = 'dev-desktop';
  }

  document.body.classList.remove('dev-mobile','dev-tablet','dev-desktop','dev-tv');
  document.body.classList.add(cls);
  return cls;
}

let deviceClass = detectDevice();
window.addEventListener('resize', () => { deviceClass = detectDevice(); });

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const MIN=0.04, MAX=8, STEP=0.15, BASE=28;
let tx=0, ty=0, scale=1, dark=false, allObjects=[];
let textEls = [];

const html    = document.documentElement;
const world   = document.getElementById('world');
const label   = document.getElementById('zoom-label');
const grid    = document.getElementById('grid-bg');
const moonIco = document.getElementById('icon-moon');
const sunIco  = document.getElementById('icon-sun');

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
function applyTheme() {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  moonIco.style.display = dark ? 'none' : '';
  sunIco.style.display  = dark ? ''     : 'none';
  applyTransform();
}
document.getElementById('btn-theme').onclick = () => {
  dark = !dark; applyTheme();
  try { localStorage.setItem('cv-theme', dark ? 'dark' : 'light'); } catch {}
};
try { dark = localStorage.getItem('cv-theme') === 'dark'; } catch {}

// ═══════════════════════════════════════════════════════
//  TRANSFORM  (grid + outline counter-scaling)
// ═══════════════════════════════════════════════════════
function applyTransform() {
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  label.textContent = Math.round(scale * 100) + '%';

  // Dot grid
  const sz = BASE * scale;
  const op = scale < 0.1 ? 0 : Math.min(0.28, 0.08 + scale * 0.15);
  const ox = ((tx % sz) + sz) % sz;
  const oy = ((ty % sz) + sz) % sz;
  const dc = dark ? `rgba(224,219,208,${op.toFixed(3)})` : `rgba(44,40,32,${op.toFixed(3)})`;
  grid.style.backgroundImage    = `radial-gradient(circle,${dc} 1.2px,transparent 1.2px)`;
  grid.style.backgroundSize     = `${sz}px ${sz}px`;
  grid.style.backgroundPosition = `${ox}px ${oy}px`;

  // Counter-scale outlines: set directly on each element so 1 canvas-px = 1 screen-px
  const ow  = (1 / scale).toFixed(6) + 'px';
  const oc  = dark ? 'rgba(224,219,208,0.45)' : 'rgba(44,40,32,0.34)';
  const ov  = `${ow} solid ${oc}`;
  textEls.forEach(el => { el.style.outline = ov; });
}

// ═══════════════════════════════════════════════════════
//  MOUSE PAN  (desktop / laptop)
// ═══════════════════════════════════════════════════════
let pan=false, msx, msy, stx, sty;

document.addEventListener('mousedown', e => {
  if (e.target.closest('#toolbar')) return;
  pan=true; msx=e.clientX; msy=e.clientY; stx=tx; sty=ty;
  document.body.classList.add('panning');
});
document.addEventListener('mousemove', e => {
  if (!pan) return;
  tx = stx + e.clientX - msx;
  ty = sty + e.clientY - msy;
  applyTransform();
});
document.addEventListener('mouseup', () => { pan=false; document.body.classList.remove('panning'); });

// ═══════════════════════════════════════════════════════
//  TOUCH  (mobile / tablet — pan + pinch-zoom)
// ═══════════════════════════════════════════════════════
let touches = {};   // id → {x,y}

function midpoint(t) {
  const pts = Object.values(t);
  return {
    x: pts.reduce((s,p)=>s+p.x,0) / pts.length,
    y: pts.reduce((s,p)=>s+p.y,0) / pts.length
  };
}
function spread(t) {
  const pts = Object.values(t);
  if (pts.length < 2) return 0;
  return Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
}

let lastMid = null, lastSpread = 0;

document.addEventListener('touchstart', e => {
  if (e.target.closest('#toolbar')) return;
  e.preventDefault();
  [...e.changedTouches].forEach(t => { touches[t.identifier] = {x:t.clientX, y:t.clientY}; });
  lastMid    = midpoint(touches);
  lastSpread = spread(touches);
}, {passive:false});

document.addEventListener('touchmove', e => {
  if (e.target.closest('#toolbar')) return;
  e.preventDefault();
  [...e.changedTouches].forEach(t => { touches[t.identifier] = {x:t.clientX, y:t.clientY}; });

  const mid = midpoint(touches);
  const sp  = spread(touches);

  if (Object.keys(touches).length >= 2 && lastSpread > 0) {
    // Pinch zoom — anchor at midpoint
    const factor = sp / lastSpread;
    const ns = Math.min(MAX, Math.max(MIN, scale * factor));
    tx = mid.x - (mid.x - tx) * (ns / scale);
    ty = mid.y - (mid.y - ty) * (ns / scale);
    scale = ns;
  }

  // Pan (works for both 1-finger and 2-finger)
  if (lastMid) {
    tx += mid.x - lastMid.x;
    ty += mid.y - lastMid.y;
  }

  lastMid    = mid;
  lastSpread = sp;
  applyTransform();
}, {passive:false});

document.addEventListener('touchend', e => {
  [...e.changedTouches].forEach(t => { delete touches[t.identifier]; });
  lastMid    = Object.keys(touches).length ? midpoint(touches) : null;
  lastSpread = spread(touches);
}, {passive:false});

// ═══════════════════════════════════════════════════════
//  MOUSE WHEEL ZOOM
// ═══════════════════════════════════════════════════════
document.addEventListener('wheel', e => {
  e.preventDefault();
  let dy = e.deltaY;
  if (e.deltaMode === 1) dy *= 20;
  if (e.deltaMode === 2) dy *= 300;
  zoomTo(scale * Math.pow(1 - STEP, dy / 100), e.clientX, e.clientY);
}, {passive:false});

// ═══════════════════════════════════════════════════════
//  ZOOM HELPERS
// ═══════════════════════════════════════════════════════
function zoomTo(ns, cx, cy) {
  ns = Math.min(MAX, Math.max(MIN, ns));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns; applyTransform();
}

document.getElementById('btn-in').onclick  = () => zoomTo(scale*(1+STEP), innerWidth/2, innerHeight/2);
document.getElementById('btn-out').onclick = () => zoomTo(scale*(1-STEP), innerWidth/2, innerHeight/2);

// ═══════════════════════════════════════════════════════
//  SMART FIT  (centres + auto-zooms to all content)
// ═══════════════════════════════════════════════════════
function fitAll() {
  if (!allObjects.length) { tx=0; ty=0; scale=1; applyTransform(); return; }

  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  allObjects.forEach(o => {
    x0 = Math.min(x0, o.x);               y0 = Math.min(y0, o.y);
    x1 = Math.max(x1, o.x+(o.width||200)); y1 = Math.max(y1, o.y+(o.height||100));
  });

  const cw = x1-x0, ch = y1-y0;
  // Padding is proportional — small canvas = generous padding, huge canvas = tighter
  const PAD = Math.max(48, Math.min(160, Math.max(cw,ch) * 0.08));
  const vw  = innerWidth  - PAD*2;
  const vh  = innerHeight - PAD*2;
  const ns  = Math.min(MAX, Math.max(MIN, Math.min(vw/cw, vh/ch)));
  tx = PAD + (vw - cw*ns)/2 - x0*ns;
  ty = PAD + (vh - ch*ns)/2 - y0*ns;
  scale = ns;
  applyTransform();
}
document.getElementById('btn-fit').onclick = fitAll;

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderText(o) {
  const el = document.createElement('div');
  el.className = 'c-text';
  el.style.left     = o.x+'px';
  el.style.top      = o.y+'px';
  el.style.width    = (o.width||200)+'px';
  el.style.fontSize = (o.fontSize||16)+'px';
  if (o.height) el.style.height = o.height+'px';
  el.innerHTML = o.content || '';
  world.appendChild(el);
  textEls.push(el);
}

function renderImage(o) {
  const img = document.createElement('img');
  img.className = 'c-image'; img.draggable = false;
  img.style.left   = o.x+'px';   img.style.top    = o.y+'px';
  img.style.width  = (o.width||200)+'px';
  img.style.height = (o.height||200)+'px';
  img.src = 'imgs/' + o.src;
  img.onerror = () => {
    img.remove();
    const ph = document.createElement('div');
    ph.className = 'img-missing';
    ph.style.cssText = `left:${o.x}px;top:${o.y}px;width:${o.width||200}px;height:${o.height||200}px`;
    ph.textContent = o.src;
    world.appendChild(ph);
  };
  world.appendChild(img);
}

// ═══════════════════════════════════════════════════════
//  LOAD
// ═══════════════════════════════════════════════════════
async function load() {
  try {
    const r = await fetch('objects.json?_=' + Date.now(), { cache:'no-store' });
    if (!r.ok) throw 0;
    const { objects=[] } = await r.json();
    allObjects = objects;
    objects.forEach(o => {
      if      (o.type === 'text')  renderText(o);
      else if (o.type === 'image') renderImage(o);
    });
    fitAll();
  } catch { console.warn('Could not load objects.json'); }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
applyTheme();
load();
</script>
</body>
</html>
