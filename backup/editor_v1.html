<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Canvas Editor</title>
<style>
:root{
  --bg:#f5f2ec; --surface:#ede9e0; --panel-bg:#e8e4db;
  --border:rgba(44,40,32,0.14); --border-s:rgba(44,40,32,0.26);
  --text:#2c2820; --text-dim:#8a8278; --blue:#3b82f6; --red:#b83a3a;
  --serif:'Times New Roman',Times,serif; --mono:'Courier New',Courier,monospace;
  --panel-w:256px; --bar-h:46px; --r:5px;
}
[data-theme="dark"]{
  --bg:#1c1b18; --surface:#27261f; --panel-bg:#222118;
  --border:rgba(224,219,208,0.14); --border-s:rgba(224,219,208,0.26);
  --text:#e0dbd0; --text-dim:#7a7870;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--serif);transition:background .3s;}

/* ── TOP TOOLBAR ── */
#toolbar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 10px;z-index:200;overflow-x:auto;transition:background .3s,border-color .3s;}
#toolbar::-webkit-scrollbar{display:none;}
.tb-sep{flex-shrink:0;width:1px;height:20px;background:var(--border);margin:0 4px;}
.tb-btn{flex-shrink:0;height:30px;padding:0 9px;border:1px solid transparent;border-radius:var(--r);background:transparent;cursor:pointer;font-family:var(--serif);font-size:11px;letter-spacing:.04em;color:var(--text);display:flex;align-items:center;gap:4px;transition:background .1s,border-color .1s,color .3s;white-space:nowrap;}
.tb-btn:hover{background:rgba(0,0,0,.06);border-color:var(--border);}
.tb-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.tb-btn svg{width:13px;height:13px;flex-shrink:0;}
#toolbar-title{font-family:var(--serif);font-weight:700;letter-spacing:.10em;text-transform:uppercase;font-size:12px;color:var(--text);margin-right:auto;transition:color .3s;pointer-events:none;}

/* ── BOTTOM PILL ── */
#bottom-bar{position:fixed;bottom:16px;left:calc((100% - var(--panel-w)) / 2);transform:translateX(-50%);z-index:150;display:flex;align-items:center;gap:4px;padding:4px 6px;background:var(--surface);border:1px solid var(--border-s);border-radius:10px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:background .3s,border-color .3s;}
.z-btn{width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background .1s,color .3s;}
.z-btn svg{width:13px;height:13px;}
.z-btn:hover{background:var(--bg);}
#zoom-label{min-width:40px;text-align:center;font-family:var(--serif);letter-spacing:.05em;color:var(--text-dim);font-size:11px;}
.bb-sep{width:1px;height:16px;background:var(--border-s);margin:0 2px;flex-shrink:0;}

/* ── Credit tag ── */
#credit{position:fixed;bottom:16px;right:20px;z-index:200;font-family:'Times New Roman',Times,serif;font-size:13px;color:var(--text-dim);letter-spacing:.03em;text-decoration:none;opacity:.75;transition:color .2s,opacity .2s;}
#credit:hover{opacity:1;color:var(--text);}

/* ── CANVAS ── */
#canvas-wrap{position:fixed;top:var(--bar-h);left:0;right:var(--panel-w);bottom:0;overflow:hidden;cursor:default;background:var(--bg);user-select:none;transition:background .3s;}
#canvas-wrap.mode-pan{cursor:grab;}
#canvas-wrap.mode-pan.panning{cursor:grabbing;}
#canvas-wrap.mid-panning{cursor:grabbing !important;}
#canvas-wrap.mode-line{cursor:crosshair;}
#grid-bg{position:absolute;inset:0;pointer-events:none;}
#world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}

/* ── SVG overlay — sits ABOVE world, covers canvas ── */
#svg-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow:visible;
  pointer-events:none;
  z-index:10;
}
/* The SVG layer inside world (for permanent lines) */
#svg-layer{position:absolute;top:0;left:0;width:1px;height:1px;overflow:visible;pointer-events:none;z-index:0;}

/* ── Object wrappers ── */
.obj-wrap{position:absolute;cursor:move;z-index:1;}
.obj-wrap.selected>.sel-ring{display:block;}
.sel-ring{display:none;position:absolute;inset:-3px;border:1.5px solid var(--blue);border-radius:2px;pointer-events:none;}
.rh{display:none;position:absolute;width:8px;height:8px;background:var(--surface);border:1.5px solid var(--blue);border-radius:2px;z-index:10;}
.obj-wrap.selected .rh{display:block;}
.rh-se{bottom:-5px;right:-5px;cursor:se-resize} .rh-sw{bottom:-5px;left:-5px;cursor:sw-resize}
.rh-ne{top:-5px;right:-5px;cursor:ne-resize}    .rh-nw{top:-5px;left:-5px;cursor:nw-resize}
.rh-n{top:-5px;left:50%;transform:translateX(-50%);cursor:n-resize}
.rh-s{bottom:-5px;left:50%;transform:translateX(-50%);cursor:s-resize}
.rh-e{right:-5px;top:50%;transform:translateY(-50%);cursor:e-resize}
.rh-w{left:-5px;top:50%;transform:translateY(-50%);cursor:w-resize}

/* ── Text box ── */
.c-text{width:100%;height:100%;outline:1px solid rgba(44,40,32,0.30);border:none;padding:9px 12px;font-family:'Times New Roman',Times,serif;color:var(--text);font-size:16px;font-weight:400;letter-spacing:.01em;line-height:1.6;word-break:break-word;background:transparent;overflow:hidden;pointer-events:none;transition:color .3s;}
[data-theme="dark"] .c-text{outline-color:rgba(224,219,208,0.42);}
.c-text b,.c-text strong{font-weight:700;} .c-text i,.c-text em{font-style:italic;} .c-text u{text-decoration:underline;}
.c-text.editing{pointer-events:all;cursor:text;overflow:auto;}

/* ── Image ── */
.c-image{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;}
.img-ph{width:100%;height:100%;border:1px dashed var(--border-s);display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;pointer-events:none;font-family:var(--mono);}

/* ── Start node ── */
.start-node-wrap{position:absolute;pointer-events:all;cursor:move;z-index:2;}
.start-node-wrap.selected>.sel-ring{display:block;}
.start-node{width:38px;height:38px;border-radius:50%;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px var(--bg),0 0 0 6px var(--text);transition:background .3s,color .3s;}
.start-node svg{width:15px;height:15px;}
.start-node-label{position:absolute;top:46px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.06em;pointer-events:none;}

/* ── Panel ── */
#panel{position:fixed;top:var(--bar-h);right:0;bottom:0;width:var(--panel-w);background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:background .3s,border-color .3s;}
#panel-inner{padding:14px;flex:1;}
.panel-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.panel-empty{color:var(--text-dim);font-size:12px;font-family:var(--serif);letter-spacing:.03em;line-height:1.7;margin-top:6px;}
.panel-hint{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:10px;line-height:1.6;}
.field-row{display:flex;flex-direction:column;gap:3px;margin-bottom:9px;}
.field-row label{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.field-row input[type=text],.field-row input[type=number]{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:3px;font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg);outline:none;transition:border-color .12s,background .3s,color .3s;}
.field-row input[type=color]{width:100%;height:32px;padding:2px 4px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--bg);}
.field-row input:focus{border-color:var(--blue);}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.field-grid .field-row{margin-bottom:0;}
.fmt-row{display:flex;gap:5px;margin-bottom:10px;}
.fmt-btn{flex:1;height:28px;border:1px solid var(--border);border-radius:3px;background:var(--bg);cursor:pointer;color:var(--text);font-family:'Times New Roman',Times,serif;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .1s,border-color .1s,color .3s;user-select:none;}
.fmt-btn:hover{background:var(--surface);border-color:var(--border-s);}
.fmt-btn.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.del-btn{width:100%;padding:7px;margin-top:4px;border:1px solid rgba(184,58,58,.3);border-radius:var(--r);background:rgba(184,58,58,.04);color:var(--red);font-family:var(--mono);font-size:11px;cursor:pointer;transition:background .1s;}
.del-btn:hover{background:rgba(184,58,58,.1);}
#toast{position:fixed;bottom:58px;left:calc((100% - var(--panel-w)) / 2);transform:translateX(-50%);background:var(--text);color:var(--bg);font-family:var(--mono);font-size:11px;padding:5px 14px;border-radius:var(--r);opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;}
#drop-overlay{position:fixed;inset:0;z-index:500;background:rgba(59,130,246,.07);border:3px dashed var(--blue);display:none;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;color:var(--blue);pointer-events:none;}
#drop-overlay.show{display:flex;}

/* ── Modal ── */
#modal-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;}
#modal-overlay.show{display:flex;}
#modal{background:var(--panel-bg);border-radius:8px;width:500px;max-width:93vw;box-shadow:0 10px 48px rgba(0,0,0,.24);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);}
#modal-tabs{display:flex;border-bottom:1px solid var(--border);}
.m-tab{flex:1;padding:12px;border:none;background:transparent;font-family:var(--serif);font-size:12px;letter-spacing:.04em;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;transition:color .1s,border-color .1s;}
.m-tab.active{color:var(--text);border-bottom-color:var(--text);}
#modal-body{padding:18px;}
#modal-body textarea{width:100%;height:200px;resize:vertical;font-family:var(--mono);font-size:11px;padding:8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);outline:none;transition:border-color .12s;line-height:1.5;}
#modal-body textarea:focus{border-color:var(--blue);}
.modal-hint{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:8px;line-height:1.5;}
.modal-file-area{border:2px dashed var(--border);border-radius:6px;padding:36px;text-align:center;cursor:pointer;font-family:var(--serif);color:var(--text-dim);font-size:13px;letter-spacing:.04em;transition:border-color .15px,background .15s;}
.modal-file-area:hover{border-color:var(--blue);background:rgba(59,130,246,.03);color:var(--text);}
#modal-footer{display:flex;gap:8px;padding:0 18px 18px;}
.modal-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);cursor:pointer;font-family:var(--serif);font-size:12px;letter-spacing:.04em;color:var(--text);transition:background .1s;}
.modal-btn:hover{background:var(--surface);}
.modal-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.modal-btn.primary:hover{opacity:.85;}
.modal-error{color:var(--red);font-family:var(--mono);font-size:11px;margin-top:8px;min-height:16px;}
</style>
</head>
<body>

<div id="toolbar">
  <span id="toolbar-title">canvas editor</span>
  <button class="tb-btn active" id="tool-select" title="Select (V)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>Select
  </button>
  <button class="tb-btn" id="tool-pan" title="Pan (H)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v2M8 12v2M2 8h2M12 8h2M4.9 4.9l1.4 1.4M9.7 9.7l1.4 1.4M4.9 11.1l1.4-1.4M9.7 6.3l1.4-1.4"/></svg>Pan
  </button>
  <button class="tb-btn" id="tool-line" title="Draw Line (L)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="14" x2="14" y2="2"/><circle cx="2" cy="14" r="1.5" fill="currentColor"/><circle cx="14" cy="2" r="1.5" fill="currentColor"/></svg>Line
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-add-text"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M8 4v8M5 12h6"/></svg>Text</button>
  <button class="tb-btn" id="btn-add-image"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="6" cy="7" r="1.2"/><path d="M2 11l3.5-3.5 2.5 2.5 2-2 4 4"/></svg>Image</button>
  <button class="tb-btn" id="btn-add-start" title="Place start node at screen centre"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><polygon points="7,5.5 11,8 7,10.5" fill="currentColor" stroke="none"/></svg>Start Node</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-import"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3M3 11v2h10v-2"/></svg>Import</button>
  <button class="tb-btn" id="btn-export"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M3 11v2h10v-2"/></svg>Export</button>
  <button class="tb-btn" id="btn-copy-json"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 11V3h8"/></svg>Copy</button>
</div>

<div id="canvas-wrap">
  <div id="grid-bg"></div>
  <div id="world">
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="panel">
  <div id="panel-inner">
    <div class="panel-label">Properties</div>
    <div id="prop-area"><p class="panel-empty">Select an object<br>to edit properties.</p></div>
  </div>
</div>

<div id="bottom-bar">
  <button class="z-btn" id="btn-out"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="4" y1="7" x2="10" y2="7"/></svg></button>
  <span id="zoom-label">100%</span>
  <button class="z-btn" id="btn-in"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="7" y1="4" x2="7" y2="10"/><line x1="4" y1="7" x2="10" y2="7"/></svg></button>
  <div class="bb-sep"></div>
  <button class="z-btn" id="btn-fit" title="Fit all"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/><rect x="5" y="5" width="6" height="6" rx="0.5"/></svg></button>
  <div class="bb-sep"></div>
  <button class="z-btn" id="theme-btn" title="Toggle theme">
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<a id="credit" href="https://example.com" target="_blank" rel="noopener">@example</a>

<div id="toast"></div>
<div id="drop-overlay">Drop image here</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-tabs">
      <button class="m-tab active" data-tab="paste">Paste JSON</button>
      <button class="m-tab" data-tab="file">Import File</button>
    </div>
    <div id="modal-body">
      <div id="tab-paste">
        <p class="modal-hint">Paste the full contents of objects.json. Replaces everything on the canvas.</p>
        <textarea id="paste-area" placeholder='{ "objects": [ ... ] }'></textarea>
        <div class="modal-error" id="paste-error"></div>
      </div>
      <div id="tab-file" style="display:none">
        <p class="modal-hint">Choose any .json file exported from this editor.</p>
        <div class="modal-file-area" id="modal-file-drop">Click to choose a file, or drag one here</div>
        <input type="file" id="json-file-input" accept=".json,application/json" style="display:none">
        <div class="modal-error" id="file-error"></div>
      </div>
    </div>
    <div id="modal-footer">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-confirm">Load</button>
    </div>
  </div>
</div>

<input type="file" id="img-file-input" accept="image/*" style="display:none">

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════
const NS='http://www.w3.org/2000/svg';
const MIN_S=0.04,MAX_S=8,ZOOM_STEP=0.15,GRID_BASE=28;
let tx=0,ty=0,scale=1,dark=false;
let objects=[],selectedId=null,nextId=1,activeTool='select',editingId=null;

const html        = document.documentElement;
const canvasWrap  = document.getElementById('canvas-wrap');
const world       = document.getElementById('world');
const svgLayer    = document.getElementById('svg-layer');   // inside world — scales
const svgOverlay  = document.getElementById('svg-overlay'); // outside world — screen coords
const gridBg      = document.getElementById('grid-bg');
const zoomLabel   = document.getElementById('zoom-label');
const moonIco     = document.getElementById('icon-moon');
const sunIco      = document.getElementById('icon-sun');

// ═══════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════
function lineColorForTheme(){ return dark?'rgba(224,219,208,0.82)':'rgba(44,40,32,0.75)'; }

function applyTheme(){
  html.setAttribute('data-theme',dark?'dark':'light');
  moonIco.style.display=dark?'none':''; sunIco.style.display=dark?'':'none';
  svgOverlay.querySelectorAll('.perm-line-group').forEach(g=>{
    const id=g.getAttribute('data-id');
    const obj=id?getObj(id):null;
    if(obj&&!obj.color){
      const ln=g.querySelector('line:first-child');
      if(ln)ln.setAttribute('stroke',lineColorForTheme());
    }
  });
  applyTransform();
}
document.getElementById('theme-btn').addEventListener('click',()=>{
  dark=!dark; applyTheme();
  try{localStorage.setItem('cv-theme',dark?'dark':'light');}catch{}
});
try{ dark=localStorage.getItem('cv-theme')==='dark'; }catch{ dark=false; }

// ═══════════════════════════════════════════════
//  TRANSFORM
// ═══════════════════════════════════════════════
function applyTransform(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  zoomLabel.textContent=Math.round(scale*100)+'%';
  const sz=GRID_BASE*scale,op=scale<0.1?0:Math.min(0.28,0.08+scale*0.15);
  const ox=((tx%sz)+sz)%sz,oy=((ty%sz)+sz)%sz;
  const dc=dark?`rgba(224,219,208,${op.toFixed(3)})`:`rgba(44,40,32,${op.toFixed(3)})`;
  gridBg.style.backgroundImage=`radial-gradient(circle,${dc} 1.2px,transparent 1.2px)`;
  gridBg.style.backgroundSize=`${sz}px ${sz}px`;
  gridBg.style.backgroundPosition=`${ox}px ${oy}px`;
  const ow=(1/scale).toFixed(6)+'px',oc=dark?'rgba(224,219,208,0.45)':'rgba(44,40,32,0.32)';
  document.querySelectorAll('#world .c-text').forEach(el=>{
    const editing=el===document.getElementById('wrap-'+editingId)?.querySelector('.c-text');
    el.style.outline=editing?`${ow} solid var(--blue)`:`${ow} solid ${oc}`;
  });
  renderLineHandles();
  renderAllLines();
}
function zoomTo(ns,cx,cy){
  ns=Math.min(MAX_S,Math.max(MIN_S,ns));
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale);
  scale=ns; applyTransform();
}
function fitAll(){
  const nonLine=objects.filter(o=>o.type!=='line');
  const lns=objects.filter(o=>o.type==='line');
  if(!nonLine.length&&!lns.length){tx=0;ty=0;scale=1;applyTransform();return;}
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  nonLine.forEach(o=>{x0=Math.min(x0,o.x);y0=Math.min(y0,o.y);x1=Math.max(x1,o.x+(o.width||60));y1=Math.max(y1,o.y+(o.height||60));});
  lns.forEach(o=>{x0=Math.min(x0,o.x1,o.x2);y0=Math.min(y0,o.y1,o.y2);x1=Math.max(x1,o.x1,o.x2);y1=Math.max(y1,o.y1,o.y2);});
  const cw=x1-x0,ch=y1-y0,PAD=Math.max(56,Math.min(180,Math.max(cw,ch)*0.09));
  const vw=canvasWrap.offsetWidth-PAD*2,vh=canvasWrap.offsetHeight-PAD*2;
  const ns=Math.min(MAX_S,Math.max(MIN_S,Math.min(vw/cw,vh/ch)));
  tx=PAD+(vw-cw*ns)/2-x0*ns; ty=PAD+(vh-ch*ns)/2-y0*ns;
  scale=ns; applyTransform();
}

// ═══════════════════════════════════════════════
//  COORDINATE CONVERSION
// ═══════════════════════════════════════════════
function screenToWorld(clientX, clientY){
  const r=canvasWrap.getBoundingClientRect();
  return{ x:(clientX - r.left - tx)/scale, y:(clientY - r.top - ty)/scale };
}
function worldToScreen(wx,wy){
  const r=canvasWrap.getBoundingClientRect();
  return{x:wx*scale+tx+r.left, y:wy*scale+ty+r.top};
}

// ═══════════════════════════════════════════════
//  TOOLS & KEYBOARD
// ═══════════════════════════════════════════════
function setTool(t){
  activeTool=t;
  ['select','pan','line'].forEach(id=>{
    document.getElementById('tool-'+id).classList.toggle('active',t===id);
  });
  canvasWrap.classList.toggle('mode-pan',t==='pan');
  canvasWrap.classList.toggle('mode-line',t==='line');
}
document.getElementById('tool-select').onclick=()=>setTool('select');
document.getElementById('tool-pan').onclick   =()=>setTool('pan');
document.getElementById('tool-line').onclick  =()=>setTool('line');

document.addEventListener('keydown',e=>{
  const inInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable;
  if(!inInput){
    if(e.key==='v'||e.key==='V')setTool('select');
    if(e.key==='h'||e.key==='H')setTool('pan');
    if(e.key==='l'||e.key==='L')setTool('line');
    if(e.key==='Escape'){stopEditing();selectObject(null);}
    if((e.key==='Delete'||e.key==='Backspace')&&selectedId)deleteSelected();
  }
  if(editingId&&(e.ctrlKey||e.metaKey)){
    if(e.key==='b'){e.preventDefault();execFmt('bold');}
    if(e.key==='i'){e.preventDefault();execFmt('italic');}
    if(e.key==='u'){e.preventDefault();execFmt('underline');}
  }
  if(e.key==='Escape'&&editingId)stopEditing();
});

// ═══════════════════════════════════════════════
//  PAN (tool-based + middle mouse button)
// ═══════════════════════════════════════════════
let panState=null;
let midPanState=null; // for middle-mouse-button panning (works in any mode)

// Tool-based pan (only when pan tool active)
canvasWrap.addEventListener('mousedown',e=>{
  if(activeTool!=='pan')return;
  if(e.button!==0)return;
  if(e.target!==canvasWrap&&e.target!==world&&e.target!==gridBg&&e.target!==svgLayer&&!e.target.closest('#svg-layer'))return;
  panState={sx:e.clientX,sy:e.clientY,stx:tx,sty:ty};
  canvasWrap.classList.add('panning');
});

// Middle mouse button pan — works in ALL modes
canvasWrap.addEventListener('mousedown',e=>{
  if(e.button!==1)return; // only middle button
  e.preventDefault();
  midPanState={sx:e.clientX,sy:e.clientY,stx:tx,sty:ty};
  canvasWrap.classList.add('mid-panning');
});

window.addEventListener('mousemove',e=>{
  if(panState){
    tx=panState.stx+e.clientX-panState.sx; ty=panState.sty+e.clientY-panState.sy;
    applyTransform();
  }
  if(midPanState){
    tx=midPanState.stx+e.clientX-midPanState.sx; ty=midPanState.sty+e.clientY-midPanState.sy;
    applyTransform();
  }
});

window.addEventListener('mouseup',e=>{
  if(e.button===1&&midPanState){
    midPanState=null;
    canvasWrap.classList.remove('mid-panning');
  }
  if(e.button===0&&panState){
    panState=null;
    canvasWrap.classList.remove('panning');
  }
});

// Prevent context menu on middle click
canvasWrap.addEventListener('auxclick',e=>{if(e.button===1)e.preventDefault();});

// Click on canvas background — deselect (only in select mode)
canvasWrap.addEventListener('mousedown',e=>{
  if(activeTool==='pan'||activeTool==='line')return;
  if(e.button!==0)return;
  if(e.target===canvasWrap||e.target===world||e.target===gridBg||e.target===svgLayer){
    stopEditing();selectObject(null);
  }
});

// Wheel zoom
canvasWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  let dy=e.deltaY;if(e.deltaMode===1)dy*=20;if(e.deltaMode===2)dy*=300;
  zoomTo(scale*Math.pow(1-ZOOM_STEP,dy/100),e.clientX,e.clientY);
},{passive:false});

document.getElementById('btn-in').onclick =()=>zoomTo(scale*(1+ZOOM_STEP),canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
document.getElementById('btn-out').onclick=()=>zoomTo(scale*(1-ZOOM_STEP),canvasWrap.offsetWidth/2,canvasWrap.offsetHeight/2);
document.getElementById('btn-fit').onclick=fitAll;

// ═══════════════════════════════════════════════
//  LINE TOOL
// ═══════════════════════════════════════════════
let lineDraw={active:false,startClientX:0,startClientY:0,preview:null};

canvasWrap.addEventListener('mousedown',e=>{
  if(activeTool!=='line')return;
  if(e.button!==0)return;
  e.preventDefault();
  e.stopPropagation();

  const r=canvasWrap.getBoundingClientRect();
  const lx=e.clientX-r.left;
  const ly=e.clientY-r.top;

  const ln=document.createElementNS(NS,'line');
  ln.setAttribute('x1',lx); ln.setAttribute('y1',ly);
  ln.setAttribute('x2',lx); ln.setAttribute('y2',ly);
  ln.setAttribute('stroke',dark?'rgba(224,219,208,0.65)':'rgba(44,40,32,0.55)');
  ln.setAttribute('stroke-width',2);
  ln.setAttribute('stroke-linecap','round');
  ln.setAttribute('stroke-dasharray','6 4');
  ln.setAttribute('pointer-events','none');
  svgOverlay.appendChild(ln);

  lineDraw={
    active:true,
    startClientX:e.clientX,
    startClientY:e.clientY,
    preview:ln
  };
});

window.addEventListener('mousemove',e=>{
  if(!lineDraw.active||!lineDraw.preview)return;
  const r=canvasWrap.getBoundingClientRect();
  lineDraw.preview.setAttribute('x2',e.clientX-r.left);
  lineDraw.preview.setAttribute('y2',e.clientY-r.top);
});

window.addEventListener('mouseup',e=>{
  if(!lineDraw.active)return;
  if(e.button!==0)return;

  const preview=lineDraw.preview;
  const startCX=lineDraw.startClientX;
  const startCY=lineDraw.startClientY;

  lineDraw={active:false,startClientX:0,startClientY:0,preview:null};

  if(preview)preview.remove();

  const dist=Math.hypot(e.clientX-startCX, e.clientY-startCY);
  if(dist<5)return;

  const w1=screenToWorld(startCX, startCY);
  const w2=screenToWorld(e.clientX, e.clientY);

  const obj={
    id:createId(), type:'line',
    x1:Math.round(w1.x), y1:Math.round(w1.y),
    x2:Math.round(w2.x), y2:Math.round(w2.y),
    color:null,
    width:2
  };
  objects.push(obj);
  buildLineEl(obj);
  selectObject(obj.id);
  setTool('select');
});

// ─── Lines rendered in svgOverlay (screen space) ───
function renderAllLines(){
  svgOverlay.querySelectorAll('.perm-line-group').forEach(g=>g.remove());
  const r=canvasWrap.getBoundingClientRect();
  objects.filter(o=>o.type==='line').forEach(obj=>{
    const s1=worldToScreen(obj.x1,obj.y1);
    const s2=worldToScreen(obj.x2,obj.y2);
    const lx1=s1.x-r.left,ly1=s1.y-r.top,lx2=s2.x-r.left,ly2=s2.y-r.top;
    const g=document.createElementNS(NS,'g');
    g.classList.add('perm-line-group');
    g.setAttribute('data-id',obj.id);
    // Visible line
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',lx1);ln.setAttribute('y1',ly1);ln.setAttribute('x2',lx2);ln.setAttribute('y2',ly2);
    ln.setAttribute('stroke',obj.color||lineColorForTheme());
    ln.setAttribute('stroke-width',obj.width||2);
    ln.setAttribute('stroke-linecap','round');
    ln.setAttribute('pointer-events','none');
    g.appendChild(ln);
    // Fat hit target
    const hit=document.createElementNS(NS,'line');
    hit.setAttribute('x1',lx1);hit.setAttribute('y1',ly1);hit.setAttribute('x2',lx2);hit.setAttribute('y2',ly2);
    hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width',14);hit.setAttribute('stroke-linecap','round');
    hit.style.cursor='move';hit.style.pointerEvents='stroke';
    hit.addEventListener('mousedown',e=>{
      if(activeTool==='pan'||activeTool==='line')return;
      e.stopPropagation();stopEditing();selectObject(obj.id);startDragLine(e,obj.id);
    });
    g.appendChild(hit);
    const firstHandle=svgOverlay.querySelector('.line-handle-group');
    if(firstHandle)svgOverlay.insertBefore(g,firstHandle);
    else svgOverlay.appendChild(g);
  });
}

function buildLineEl(obj){ renderAllLines(); renderLineHandles(); }
function updateLineEl(obj){ renderAllLines(); renderLineHandles(); }
function removeLineEl(id){ renderAllLines(); }

// ─── Endpoint handles ───
function renderLineHandles(){
  svgOverlay.querySelectorAll('.line-handle-group').forEach(g=>g.remove());
  if(!selectedId)return;
  const obj=getObj(selectedId); if(!obj||obj.type!=='line')return;

  const g=document.createElementNS(NS,'g');
  g.classList.add('line-handle-group');

  [[obj.x1,obj.y1,'a'],[obj.x2,obj.y2,'b']].forEach(([wx,wy,pt])=>{
    const s=worldToScreen(wx,wy);
    const r=canvasWrap.getBoundingClientRect();
    const lx=s.x-r.left, ly=s.y-r.top;
    const HW=6;
    const rect=document.createElementNS(NS,'rect');
    rect.setAttribute('x',lx-HW); rect.setAttribute('y',ly-HW);
    rect.setAttribute('width',HW*2); rect.setAttribute('height',HW*2);
    rect.setAttribute('rx',2);
    rect.setAttribute('fill','#fff');
    rect.setAttribute('stroke','var(--blue)');
    rect.setAttribute('stroke-width',1.5);
    rect.style.cursor='crosshair';
    rect.style.pointerEvents='all';
    rect.addEventListener('mousedown',e=>{
      e.stopPropagation();
      startDragEndpoint(e,obj.id,pt);
    });
    g.appendChild(rect);
  });

  svgOverlay.appendChild(g);
  g.style.pointerEvents='all';
  svgOverlay.style.pointerEvents='none';
}

function startDragLine(e,id){
  const obj=getObj(id);if(!obj)return;
  const sx=e.clientX,sy=e.clientY,ox1=obj.x1,oy1=obj.y1,ox2=obj.x2,oy2=obj.y2;
  function onMove(e){
    const dx=(e.clientX-sx)/scale,dy=(e.clientY-sy)/scale;
    obj.x1=Math.round(ox1+dx);obj.y1=Math.round(oy1+dy);
    obj.x2=Math.round(ox2+dx);obj.y2=Math.round(oy2+dy);
    updateLineEl(obj);renderPanel();
  }
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
}

function startDragEndpoint(e,id,pt){
  e.preventDefault();e.stopPropagation();
  const obj=getObj(id);if(!obj)return;
  function onMove(e){
    const w=screenToWorld(e.clientX,e.clientY);
    if(pt==='a'){obj.x1=Math.round(w.x);obj.y1=Math.round(w.y);}
    else        {obj.x2=Math.round(w.x);obj.y2=Math.round(w.y);}
    updateLineEl(obj);renderPanel();
  }
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function createId(){return 'obj-'+(nextId++);}
function getObj(id){return objects.find(o=>o.id===id);}
function removeEl(id){
  const w=document.getElementById('wrap-'+id);if(w)w.remove();
  removeLineEl(id);
  svgOverlay.querySelectorAll('.line-handle-group').forEach(g=>g.remove());
}

// ═══════════════════════════════════════════════
//  SELECTION
// ═══════════════════════════════════════════════
function selectObject(id){
  if(selectedId){
    const el=document.getElementById('wrap-'+selectedId);if(el)el.classList.remove('selected');
  }
  selectedId=id;
  if(id){
    const el=document.getElementById('wrap-'+id);if(el)el.classList.add('selected');
  }
  renderLineHandles();
  renderAllLines();
  renderPanel();
}
// ═══════════════════════════════════════════════
function startEditing(id){
  if(editingId===id)return;
  stopEditing();editingId=id;
  const wrap=document.getElementById('wrap-'+id);
  const inner=wrap&&wrap.querySelector('.c-text');if(!inner)return;
  inner.classList.add('editing');inner.contentEditable='true';
  inner.style.outline=`${(1/scale).toFixed(6)}px solid var(--blue)`;
  inner.focus();
  const range=document.createRange();range.selectNodeContents(inner);range.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  renderPanel();
}
function stopEditing(){
  if(!editingId)return;
  const obj=getObj(editingId);
  const wrap=document.getElementById('wrap-'+editingId);
  if(wrap&&obj){const inner=wrap.querySelector('.c-text');if(inner){inner.contentEditable='false';inner.classList.remove('editing');obj.content=inner.innerHTML;}}
  editingId=null;applyTransform();renderPanel();
}
function execFmt(cmd){
  if(!editingId){
    if(selectedId){
      const obj=getObj(selectedId);
      if(obj&&obj.type==='text'){
        startEditing(selectedId);
        const wrap=document.getElementById('wrap-'+selectedId);
        const inner=wrap&&wrap.querySelector('.c-text');
        if(inner){const r=document.createRange();r.selectNodeContents(inner);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);document.execCommand(cmd,false,null);obj.content=inner.innerHTML;updateFmtButtons();}
      }
    }
    return;
  }
  document.execCommand(cmd,false,null);
  const obj=getObj(editingId);const wrap=document.getElementById('wrap-'+editingId);
  if(wrap&&obj){const inner=wrap.querySelector('.c-text');if(inner)obj.content=inner.innerHTML;}
  updateFmtButtons();
}
function queryFmt(cmd){try{return document.queryCommandState(cmd);}catch{return false;}}
function updateFmtButtons(){['bold','italic','underline'].forEach(cmd=>{const btn=document.getElementById('fmt-'+cmd);if(btn)btn.classList.toggle('on',queryFmt(cmd));});}
document.addEventListener('selectionchange',()=>{if(editingId)updateFmtButtons();});

// ═══════════════════════════════════════════════
//  BUILD DOM WRAPPERS
// ═══════════════════════════════════════════════
function buildWrap(obj){
  if(obj.type==='line'){buildLineEl(obj);return;}

  if(obj.type==='start'){
    const wrap=document.createElement('div');
    wrap.className='start-node-wrap';wrap.id='wrap-'+obj.id;
    wrap.style.cssText=`left:${obj.x}px;top:${obj.y}px;width:60px;height:60px;`;
    const ring=document.createElement('div');ring.className='sel-ring';wrap.appendChild(ring);
    const node=document.createElement('div');node.className='start-node';
    node.innerHTML=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="4,2 14,8 4,14" fill="currentColor" stroke="none"/></svg>`;
    wrap.appendChild(node);
    const lbl=document.createElement('div');lbl.className='start-node-label';lbl.textContent='start';
    wrap.appendChild(lbl);
    wrap.addEventListener('mousedown',e=>{e.stopPropagation();if(activeTool==='pan'||activeTool==='line')return;stopEditing();selectObject(obj.id);startDrag(e,obj.id);});
    world.appendChild(wrap);return;
  }

  const wrap=document.createElement('div');
  wrap.className='obj-wrap';wrap.id='wrap-'+obj.id;
  wrap.style.cssText=`left:${obj.x}px;top:${obj.y}px;width:${obj.width||60}px;height:${obj.height?obj.height+'px':'auto'}`;
  const ring=document.createElement('div');ring.className='sel-ring';wrap.appendChild(ring);

  if(obj.type==='text'){
    const inner=document.createElement('div');
    inner.className='c-text';inner.style.fontSize=(obj.fontSize||16)+'px';
    if(obj.color)inner.style.color=obj.color;
    inner.contentEditable='false';inner.innerHTML=obj.content||'';
    wrap.appendChild(inner);
    wrap.addEventListener('dblclick',e=>{if(activeTool==='pan'||activeTool==='line')return;e.stopPropagation();selectObject(obj.id);startEditing(obj.id);});
    wrap.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rh'))return;
      e.stopPropagation();if(activeTool==='pan'||activeTool==='line')return;
      if(editingId&&editingId!==obj.id)stopEditing();
      if(editingId===obj.id)return;
      selectObject(obj.id);startDrag(e,obj.id);
    });
  } else if(obj.type==='image'){
    const img=document.createElement('img');img.className='c-image';img.draggable=false;img.src=obj.dataUrl||'';
    img.onerror=()=>{img.remove();const ph=document.createElement('div');ph.className='img-ph';ph.textContent=obj.src||'image';wrap.appendChild(ph);};
    wrap.appendChild(img);
    wrap.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rh'))return;
      e.stopPropagation();if(activeTool==='pan'||activeTool==='line')return;
      stopEditing();selectObject(obj.id);startDrag(e,obj.id);
    });
  }

  ['nw','n','ne','w','e','sw','s','se'].forEach(dir=>{
    const h=document.createElement('div');h.className=`rh rh-${dir}`;wrap.appendChild(h);
    h.addEventListener('mousedown',e=>{e.stopPropagation();startResize(e,obj.id,dir);});
  });
  world.appendChild(wrap);
}

function updateWrap(obj){
  const wrap=document.getElementById('wrap-'+obj.id);
  if(!wrap){buildWrap(obj);return;}
  wrap.style.left=obj.x+'px';wrap.style.top=obj.y+'px';
  if(obj.type!=='start'){wrap.style.width=obj.width+'px';wrap.style.height=obj.height?obj.height+'px':'auto';}
  if(obj.type==='text'){
    const inner=wrap.querySelector('.c-text');
    if(inner){inner.style.fontSize=(obj.fontSize||16)+'px';inner.style.color=obj.color||'';if(editingId!==obj.id)inner.innerHTML=obj.content||'';}
  }
  applyTransform();
}

// ═══════════════════════════════════════════════
//  DRAG & RESIZE
// ═══════════════════════════════════════════════
function startDrag(e,id){
  const obj=getObj(id);if(!obj)return;
  const sx=e.clientX,sy=e.clientY,ox=obj.x,oy=obj.y;
  function onMove(e){obj.x=Math.round(ox+(e.clientX-sx)/scale);obj.y=Math.round(oy+(e.clientY-sy)/scale);updateWrap(obj);renderPanel();}
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
}
function startResize(e,id,dir){
  const obj=getObj(id);if(!obj)return;
  e.preventDefault();stopEditing();
  const sx=e.clientX,sy=e.clientY,ox=obj.x,oy=obj.y,ow=obj.width;
  const oh=obj.height||document.getElementById('wrap-'+id).offsetHeight;
  function onMove(e){
    const dx=(e.clientX-sx)/scale,dy=(e.clientY-sy)/scale;
    let nx=ox,ny=oy,nw=ow,nh=oh;
    if(dir.includes('e'))nw=Math.max(60,ow+dx);if(dir.includes('s'))nh=Math.max(30,oh+dy);
    if(dir.includes('w')){nw=Math.max(60,ow-dx);nx=ox+(ow-nw);}
    if(dir.includes('n')){nh=Math.max(30,oh-dy);ny=oy+(oh-nh);}
    obj.x=Math.round(nx);obj.y=Math.round(ny);obj.width=Math.round(nw);obj.height=Math.round(nh);
    updateWrap(obj);renderPanel();
  }
  function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
  window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
}

// ═══════════════════════════════════════════════
//  ADD OBJECTS
// ═══════════════════════════════════════════════
function addText(){
  setTool('select');
  const r=canvasWrap.getBoundingClientRect();
  const c=screenToWorld(r.left+canvasWrap.offsetWidth/2,r.top+canvasWrap.offsetHeight/2);
  const obj={id:createId(),type:'text',x:Math.round(c.x-110),y:Math.round(c.y-40),width:220,height:80,fontSize:16,content:'New text',color:''};
  objects.push(obj);buildWrap(obj);selectObject(obj.id);applyTransform();
}
function addImageFromDataUrl(dataUrl,filename){
  setTool('select');
  const img=new Image();
  img.onload=()=>{
    const maxW=400,maxH=400;let w=img.naturalWidth,h=img.naturalHeight;
    if(w>maxW){h=h*maxW/w;w=maxW;}if(h>maxH){w=w*maxH/h;h=maxH;}
    const r=canvasWrap.getBoundingClientRect();
    const c=screenToWorld(r.left+canvasWrap.offsetWidth/2,r.top+canvasWrap.offsetHeight/2);
    const obj={id:createId(),type:'image',x:Math.round(c.x-w/2),y:Math.round(c.y-h/2),width:Math.round(w),height:Math.round(h),src:filename,dataUrl};
    objects.push(obj);buildWrap(obj);selectObject(obj.id);
  };
  img.src=dataUrl;
}
function addStartNode(){
  const existing=objects.find(o=>o.type==='start');
  if(existing){removeEl(existing.id);objects=objects.filter(o=>o.id!==existing.id);}
  setTool('select');
  const r=canvasWrap.getBoundingClientRect();
  const c=screenToWorld(r.left+canvasWrap.offsetWidth/2,r.top+canvasWrap.offsetHeight/2);
  const obj={id:createId(),type:'start',x:Math.round(c.x-30),y:Math.round(c.y-30)};
  objects.push(obj);buildWrap(obj);selectObject(obj.id);applyTransform();
  showToast('Start node placed — viewers open here');
}

document.getElementById('btn-add-text').onclick  =addText;
document.getElementById('btn-add-image').onclick =()=>document.getElementById('img-file-input').click();
document.getElementById('btn-add-start').onclick =addStartNode;
document.getElementById('img-file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();reader.onload=ev=>addImageFromDataUrl(ev.target.result,f.name);
  reader.readAsDataURL(f);e.target.value='';
});

// Drag & drop images
const dropOverlay=document.getElementById('drop-overlay');
let dragCtr=0;
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){e.preventDefault();dragCtr++;dropOverlay.classList.add('show');}});
document.addEventListener('dragleave',()=>{dragCtr--;if(dragCtr<=0){dragCtr=0;dropOverlay.classList.remove('show');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();dragCtr=0;dropOverlay.classList.remove('show');
  [...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach(f=>{
    const reader=new FileReader();reader.onload=ev=>addImageFromDataUrl(ev.target.result,f.name);reader.readAsDataURL(f);
  });
});

// ═══════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════
function deleteSelected(){
  stopEditing();objects=objects.filter(o=>o.id!==selectedId);removeEl(selectedId);selectedId=null;renderPanel();
}

// ═══════════════════════════════════════════════
//  PANEL
// ═══════════════════════════════════════════════
function renderPanel(){
  const area=document.getElementById('prop-area');
  if(!selectedId){area.innerHTML='<p class="panel-empty">Select an object<br>to edit properties.</p>';return;}
  const obj=getObj(selectedId);if(!obj){area.innerHTML='';return;}

  if(obj.type==='text'){
    const colorVal=obj.color||'#2c2820';
    area.innerHTML=`
      <p class="panel-hint">Double-click to edit inline.<br>Ctrl/⌘+B/I/U for formatting.</p>
      <div class="panel-label">Formatting</div>
      <div class="fmt-row">
        <button class="fmt-btn" id="fmt-bold"><b>B</b></button>
        <button class="fmt-btn" id="fmt-italic"><em>I</em></button>
        <button class="fmt-btn" id="fmt-underline"><u>U</u></button>
      </div>
      <div class="field-row"><label>Text colour</label><input type="color" id="f-color" value="${colorVal}"></div>
      <div class="panel-label">Layout</div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x" value="${obj.x}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y" value="${obj.y}"></div>
        <div class="field-row"><label>Width</label><input type="number" id="f-w" value="${obj.width}"></div>
        <div class="field-row"><label>Height</label><input type="number" id="f-h" value="${obj.height||''}"></div>
        <div class="field-row"><label>Font size</label><input type="number" id="f-fs" value="${obj.fontSize||16}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    document.getElementById('fmt-bold').onclick     =()=>execFmt('bold');
    document.getElementById('fmt-italic').onclick   =()=>execFmt('italic');
    document.getElementById('fmt-underline').onclick=()=>execFmt('underline');
    updateFmtButtons();
    bind('f-color','input',v=>{obj.color=v;const inner=document.getElementById('wrap-'+obj.id)?.querySelector('.c-text');if(inner)inner.style.color=v;});
    bind('f-x','number',v=>{obj.x=+v;updateWrap(obj);});bind('f-y','number',v=>{obj.y=+v;updateWrap(obj);});
    bind('f-w','number',v=>{obj.width=Math.max(20,+v);updateWrap(obj);});bind('f-h','number',v=>{obj.height=+v||undefined;updateWrap(obj);});
    bind('f-fs','number',v=>{obj.fontSize=Math.max(6,+v);updateWrap(obj);});
  } else if(obj.type==='image'){
    area.innerHTML=`
      <div class="panel-label">Image</div>
      <div class="field-row"><label>Filename (src)</label><input type="text" id="f-src" value="${escHtml(obj.src||'')}"></div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x" value="${obj.x}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y" value="${obj.y}"></div>
        <div class="field-row"><label>Width</label><input type="number" id="f-w" value="${obj.width}"></div>
        <div class="field-row"><label>Height</label><input type="number" id="f-h" value="${obj.height||''}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    bind('f-src','text',v=>{obj.src=v;});bind('f-x','number',v=>{obj.x=+v;updateWrap(obj);});bind('f-y','number',v=>{obj.y=+v;updateWrap(obj);});
    bind('f-w','number',v=>{obj.width=Math.max(20,+v);updateWrap(obj);});bind('f-h','number',v=>{obj.height=+v||undefined;updateWrap(obj);});
  } else if(obj.type==='line'){
    const hexCol=rgbToHex(obj.color)||'#2c2820';
    area.innerHTML=`
      <div class="panel-label">Line</div>
      <div class="field-row"><label>Colour</label><input type="color" id="f-lcolor" value="${hexCol}"></div>
      <div class="field-row"><label>Width (px)</label><input type="number" id="f-lw" value="${obj.width||2}" min="1" max="20"></div>
      <div class="panel-label" style="margin-top:8px">Point A</div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x1" value="${obj.x1}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y1" value="${obj.y1}"></div>
      </div>
      <div class="panel-label">Point B</div>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x2" value="${obj.x2}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y2" value="${obj.y2}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    bind('f-lcolor','input',v=>{obj.color=v;updateLineEl(obj);});
    bind('f-lw','number',v=>{obj.width=Math.max(1,+v);updateLineEl(obj);});
    bind('f-x1','number',v=>{obj.x1=+v;updateLineEl(obj);});bind('f-y1','number',v=>{obj.y1=+v;updateLineEl(obj);});
    bind('f-x2','number',v=>{obj.x2=+v;updateLineEl(obj);});bind('f-y2','number',v=>{obj.y2=+v;updateLineEl(obj);});
  } else if(obj.type==='start'){
    area.innerHTML=`
      <div class="panel-label">Start Node</div>
      <p class="panel-hint">Viewers open here.<br>Pan & zoom to the desired view,<br>then place this at the centre.</p>
      <div class="field-grid">
        <div class="field-row"><label>X</label><input type="number" id="f-x" value="${obj.x}"></div>
        <div class="field-row"><label>Y</label><input type="number" id="f-y" value="${obj.y}"></div>
      </div>
      <button class="del-btn" id="del-btn">Delete</button>`;
    bind('f-x','number',v=>{obj.x=+v;updateWrap(obj);});bind('f-y','number',v=>{obj.y=+v;updateWrap(obj);});
  }
  const delBtn=document.getElementById('del-btn');if(delBtn)delBtn.onclick=deleteSelected;
}

function bind(id,type,cb){const el=document.getElementById(id);if(!el)return;el.addEventListener(type==='text'||type==='input'?'input':'change',()=>cb(el.value));}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rgbToHex(c){
  if(!c)return null;if(c.startsWith('#'))return c;
  const m=c.match(/[\d.]+/g);if(!m||m.length<3)return null;
  return'#'+[0,1,2].map(i=>('0'+Math.round(+m[i]).toString(16)).slice(-2)).join('');
}

// ═══════════════════════════════════════════════
//  JSON
// ═══════════════════════════════════════════════
function buildJson(){
  if(editingId){const obj=getObj(editingId);const wrap=document.getElementById('wrap-'+editingId);if(wrap&&obj){const inner=wrap.querySelector('.c-text');if(inner)obj.content=inner.innerHTML;}}
  const out=objects.map(o=>{
    if(o.type==='text'){const b={type:'text',id:o.id,x:o.x,y:o.y,width:o.width};if(o.height)b.height=o.height;b.fontSize=o.fontSize||16;b.content=o.content||'';if(o.color)b.color=o.color;return b;}
    if(o.type==='image'){const b={type:'image',id:o.id,x:o.x,y:o.y,width:o.width};if(o.height)b.height=o.height;b.src=o.src||'';return b;}
    if(o.type==='line'){return{type:'line',id:o.id,x1:o.x1,y1:o.y1,x2:o.x2,y2:o.y2,color:o.color||null,width:o.width||2};}
    if(o.type==='start'){return{type:'start',id:o.id,x:o.x,y:o.y};}
    return null;
  }).filter(Boolean);
  return JSON.stringify({objects:out},null,2);
}
document.getElementById('btn-export').onclick=()=>{
  const blob=new Blob([buildJson()],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='objects.json';a.click();URL.revokeObjectURL(a.href);
};
document.getElementById('btn-copy-json').onclick=async()=>{
  const json=buildJson();
  try{await navigator.clipboard.writeText(json);}catch{const ta=document.createElement('textarea');ta.value=json;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast('Copied ✓');
};
function showToast(msg,dur=1900){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ═══════════════════════════════════════════════
//  IMPORT
// ═══════════════════════════════════════════════
function loadJsonData(raw){
  try{
    const parsed=typeof raw==='string'?JSON.parse(raw):raw;
    if(!parsed.objects||!Array.isArray(parsed.objects))throw new Error('"objects" array missing');
    stopEditing();selectObject(null);
    objects.forEach(o=>{
      const w=document.getElementById('wrap-'+o.id);if(w)w.remove();
      removeLineEl(o.id);
    });
    svgOverlay.querySelectorAll('.line-handle-group').forEach(g=>g.remove());
    objects=[];
    parsed.objects.forEach(o=>{
      const obj={...o,id:o.id||createId()};
      const n=parseInt((obj.id||'').replace(/[^0-9]/g,''));
      if(!isNaN(n)&&n>=nextId)nextId=n+1;
      objects.push(obj);
      buildWrap(obj);
    });
    applyTransform();fitAll();return null;
  }catch(err){return err.message;}
}

const modalOverlay=document.getElementById('modal-overlay');
let activeTab='paste',pendingFileJson=null;
document.getElementById('btn-import').onclick=()=>{
  document.getElementById('paste-area').value='';document.getElementById('paste-error').textContent='';
  document.getElementById('file-error').textContent='';document.getElementById('modal-file-drop').textContent='Click to choose a file, or drag one here';
  pendingFileJson=null;switchTab('paste');modalOverlay.classList.add('show');
};
document.getElementById('modal-cancel').onclick=()=>modalOverlay.classList.remove('show');
modalOverlay.addEventListener('mousedown',e=>{if(e.target===modalOverlay)modalOverlay.classList.remove('show');});
document.querySelectorAll('.m-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
function switchTab(tab){activeTab=tab;document.querySelectorAll('.m-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.getElementById('tab-paste').style.display=tab==='paste'?'':'none';document.getElementById('tab-file').style.display=tab==='file'?'':'none';}
const modalFileDrop=document.getElementById('modal-file-drop'),jsonFileInput=document.getElementById('json-file-input');
modalFileDrop.addEventListener('click',()=>jsonFileInput.click());
modalFileDrop.addEventListener('dragover',e=>{e.preventDefault();modalFileDrop.style.borderColor='var(--blue)';});
modalFileDrop.addEventListener('dragleave',()=>{modalFileDrop.style.borderColor='';});
modalFileDrop.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();modalFileDrop.style.borderColor='';const f=e.dataTransfer.files[0];if(f)readJsonFile(f);});
jsonFileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readJsonFile(f);e.target.value='';});
function readJsonFile(f){const r=new FileReader();r.onload=ev=>{pendingFileJson=ev.target.result;modalFileDrop.textContent='✓ '+f.name;document.getElementById('file-error').textContent='';};r.readAsText(f);}
document.getElementById('modal-confirm').onclick=()=>{
  let err;
  if(activeTab==='paste'){const raw=document.getElementById('paste-area').value.trim();if(!raw){document.getElementById('paste-error').textContent='Paste JSON first.';return;}err=loadJsonData(raw);if(err){document.getElementById('paste-error').textContent='Error: '+err;return;}}
  else{if(!pendingFileJson){document.getElementById('file-error').textContent='Choose a file first.';return;}err=loadJsonData(pendingFileJson);if(err){document.getElementById('file-error').textContent='Error: '+err;return;}}
  modalOverlay.classList.remove('show');showToast('JSON loaded ✓');
};

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
setTool('select');
applyTheme();
</script>
